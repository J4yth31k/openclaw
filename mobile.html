<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>OpenClaw Mobile</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:   #05060f;
    --card: #0a0c1e;
    --bdr:  #1a1f3a;
    --cyan: #00d4ff;
    --green:#00ff88;
    --red:  #ff4444;
    --gold: #ffd700;
    --mut:  #4a5080;
    --dim:  #8892b0;
    --text: #ccd6f6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; padding-bottom: calc(70px + env(safe-area-inset-bottom)); }

  /* ── Header ── */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px;
    background: var(--bg); border-bottom: 1px solid var(--bdr);
    position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px);
  }
  .logo { font-family: 'Orbitron', monospace; font-size: 16px; font-weight: 900; color: var(--cyan); letter-spacing: 2px; }
  .logo span { color: var(--gold); }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--mut); transition: background .3s; flex-shrink: 0; }
  .status-dot.live { background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

  /* ── Tab bar ── */
  .tab-bar {
    display: flex; background: var(--card); border-bottom: 1px solid var(--bdr);
    position: sticky; top: 53px; z-index: 99;
  }
  .tab-btn {
    flex: 1; padding: 11px 0; font-size: 12px; font-weight: 600; color: var(--mut);
    background: none; border: none; border-bottom: 2px solid transparent;
    cursor: pointer; transition: all .2s; letter-spacing: .5px;
  }
  .tab-btn.active { color: var(--cyan); border-bottom-color: var(--cyan); }

  /* ── Tab pages ── */
  .tab-page { display: none; }
  .tab-page.active { display: block; }

  /* ── Session bar ── */
  .session-bar { display: flex; gap: 8px; padding: 10px 16px; overflow-x: auto; border-bottom: 1px solid var(--bdr); scrollbar-width: none; }
  .session-bar::-webkit-scrollbar { display: none; }
  .session-chip { flex-shrink: 0; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; border: 1px solid var(--bdr); background: var(--card); color: var(--mut); white-space: nowrap; }
  .session-chip.active  { border-color: var(--green); color: var(--green); background: rgba(0,255,136,.08); }
  .session-chip.overlap { border-color: var(--gold);  color: var(--gold);  background: rgba(255,215,0,.08); }

  /* ── Section title ── */
  .section-title { padding: 14px 16px 8px; font-size: 11px; font-weight: 600; color: var(--mut); letter-spacing: 1.5px; text-transform: uppercase; }

  /* ── Price grid ── */
  .price-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 16px; }
  .price-card { background: var(--card); border: 1px solid var(--bdr); border-radius: 12px; padding: 14px 12px; position: relative; overflow: hidden; transition: border-color .2s; }
  .price-card.up   { border-color: rgba(0,255,136,.3); }
  .price-card.down { border-color: rgba(255,68,68,.3); }
  .price-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:var(--mut); transition:background .3s; }
  .price-card.up::before   { background: var(--green); }
  .price-card.down::before { background: var(--red); }
  .card-sym   { font-family:'Orbitron',monospace; font-size:13px; font-weight:700; color:var(--cyan); margin-bottom:6px; }
  .card-price { font-family:'Orbitron',monospace; font-size:20px; font-weight:900; line-height:1; margin-bottom:6px; }
  .card-price.up   { color: var(--green); }
  .card-price.down { color: var(--red); }
  .card-meta   { display:flex; justify-content:space-between; align-items:center; }
  .card-change { font-size:11px; font-weight:600; }
  .card-change.up   { color: var(--green); }
  .card-change.down { color: var(--red); }
  .card-session { font-size:10px; color:var(--mut); }

  /* ── Agent cards ── */
  .agent-grid { display: flex; flex-direction: column; gap: 10px; padding: 0 16px 16px; }
  .agent-card {
    background: var(--card); border-radius: 12px; padding: 14px;
    display: flex; align-items: center; gap: 14px;
    border: 1px solid var(--bdr); border-left-width: 3px;
    transition: border-color .2s;
  }
  .agent-card.analyzing { animation: glow .8s ease-in-out infinite alternate; }
  @keyframes glow { from { box-shadow: none; } to { box-shadow: 0 0 12px rgba(0,212,255,.3); } }
  .agent-emoji { font-size: 28px; line-height: 1; flex-shrink: 0; width: 40px; text-align: center; }
  .agent-info  { flex: 1; min-width: 0; }
  .agent-name  { font-family: 'Orbitron', monospace; font-size: 11px; font-weight: 700; letter-spacing: 1px; margin-bottom: 2px; }
  .agent-role  { font-size: 11px; color: var(--dim); margin-bottom: 4px; }
  .agent-quote { font-size: 10px; color: var(--mut); font-style: italic; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .agent-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
  .grade-badge { font-family:'Orbitron',monospace; font-size:14px; font-weight:900; }
  .grade-S { color: var(--gold); }
  .grade-A { color: var(--green); }
  .grade-B { color: var(--cyan); }
  .grade-C { color: var(--dim); }
  .score-bar-wrap { width: 52px; height: 4px; background: var(--bdr); border-radius: 2px; overflow: hidden; }
  .score-bar { height: 100%; border-radius: 2px; background: var(--cyan); }
  .score-val { font-size: 10px; color: var(--mut); }
  .agent-status { font-size: 9px; padding: 2px 6px; border-radius: 10px; font-weight: 600; letter-spacing: .5px; }
  .agent-status.online   { background: rgba(0,255,136,.12); color: var(--green); }
  .agent-status.analyzing{ background: rgba(0,212,255,.12); color: var(--cyan); }

  /* ── Alerts feed ── */
  .alerts-list { display: flex; flex-direction: column; gap: 8px; padding: 0 16px; }
  .alert-card { background: var(--card); border: 1px solid var(--bdr); border-radius: 10px; padding: 12px 14px; display: flex; gap: 12px; align-items: flex-start; }
  .alert-badge { width:36px; height:36px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
  .alert-badge.BUY     { background: rgba(0,255,136,.12); }
  .alert-badge.SELL    { background: rgba(255,68,68,.12); }
  .alert-badge.NEUTRAL { background: rgba(255,165,0,.12); }
  .alert-body  { flex:1; min-width:0; }
  .alert-title { font-size:13px; font-weight:600; color:var(--text); margin-bottom:3px; }
  .alert-sub   { font-size:11px; color:var(--dim); margin-bottom:4px; }
  .alert-analysis { font-size:10px; color:var(--mut); font-style:italic; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .alert-time  { font-size:10px; color:var(--mut); flex-shrink:0; margin-top:2px; }
  .empty-state { text-align:center; padding:30px 16px; color:var(--mut); font-size:13px; }

  /* ── Bottom nav ── */
  .nav-bar { position:fixed; bottom:0; left:0; right:0; display:flex; background:var(--card); border-top:1px solid var(--bdr); padding:8px 0 env(safe-area-inset-bottom); z-index:200; }
  .nav-item { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; padding:6px 0; text-decoration:none; color:var(--mut); font-size:10px; font-weight:500; transition:color .2s; }
  .nav-item:hover, .nav-item.active-link { color: var(--cyan); }
  .nav-icon { font-size:18px; line-height:1; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="logo">OPEN<span>CLAW</span></div>
  <div style="display:flex;align-items:center;gap:8px;">
    <span id="status-text" style="font-size:11px;color:var(--mut)">Connecting…</span>
    <div class="status-dot" id="status-dot"></div>
  </div>
</div>

<!-- Tab bar -->
<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('prices')">📊 PRICES</button>
  <button class="tab-btn"        onclick="switchTab('agents')">🦾 AGENTS</button>
  <button class="tab-btn"        onclick="switchTab('alerts')">🔔 ALERTS</button>
</div>

<!-- ══ PRICES TAB ══ -->
<div class="tab-page active" id="tab-prices">
  <div class="session-bar" id="session-bar">
    <div class="session-chip" id="sess-rth">🔔 RTH</div>
    <div class="session-chip" id="sess-pre">🌅 Pre-Market</div>
    <div class="session-chip" id="sess-london">🇬🇧 London</div>
    <div class="session-chip" id="sess-ny">🗽 New York</div>
    <div class="session-chip" id="sess-tokyo">🗼 Tokyo</div>
    <div class="session-chip" id="sess-sydney">🦘 Sydney</div>
  </div>
  <div class="section-title">Live Prices</div>
  <div class="price-grid" id="price-grid"></div>
</div>

<!-- ══ AGENTS TAB ══ -->
<div class="tab-page" id="tab-agents">
  <div class="section-title">Agent Network — 12 Operational</div>
  <div class="agent-grid" id="agent-grid"></div>
</div>

<!-- ══ ALERTS TAB ══ -->
<div class="tab-page" id="tab-alerts">
  <div class="section-title">Recent Signals</div>
  <div class="alerts-list" id="alerts-list">
    <div class="empty-state" id="empty-alerts">Waiting for TradingView signals…</div>
  </div>
</div>

<!-- Bottom nav -->
<div class="nav-bar">
  <a class="nav-item active-link" href="mobile.html"><span class="nav-icon">📱</span>Mobile</a>
  <a class="nav-item" href="avengers_hq_unified.html"><span class="nav-icon">🖥️</span>Desktop</a>
  <a class="nav-item" href="avengers_rimworld.html"><span class="nav-icon">🌐</span>Map</a>
</div>

<script>
// ── Config ────────────────────────────────────────────────────────
const WS_URL  = 'wss://openclaw-production-44a4.up.railway.app/ws/market';
const SYMBOLS = ['NQ','ES','CL','GC','MNQ','MES'];
const ACTION_EMOJI = { BUY:'🟢', SELL:'🔴', NEUTRAL:'🟡' };

// ── Agents data ───────────────────────────────────────────────────
const AVENGERS = [
  {id:'ironman',   name:'IRON MAN',    hero:'Tony Stark',       role:'Technical Analysis', emoji:'🦾', color:'#ef4444', grade:'S', score:96, quote:'JARVIS, run the scan.'},
  {id:'captain',   name:'CAPTAIN',     hero:'Steve Rogers',     role:'Fundamentals',       emoji:'🛡️', color:'#3b82f6', grade:'A', score:89, quote:'I can do this all day.'},
  {id:'scarlet',   name:'SCARLET',     hero:'Wanda Maximoff',   role:'Sentiment',          emoji:'🔮', color:'#ec4899', grade:'A', score:87, quote:'I read their minds.'},
  {id:'thor',      name:'THOR',        hero:'Thor Odinson',     role:'Correlations',       emoji:'⚡', color:'#eab308', grade:'B', score:82, quote:'Bring me Thanos!'},
  {id:'vision',    name:'VISION',      hero:'Vision',           role:'Order Flow',         emoji:'👁️', color:'#10b981', grade:'A', score:91, quote:'I am processing.'},
  {id:'spiderman', name:'SPIDER-MAN',  hero:'Peter Parker',     role:'News & Events',      emoji:'🕷️', color:'#ef4444', grade:'B', score:78, quote:'My spider-sense!'},
  {id:'widow',     name:'BLACK WIDOW', hero:'Natasha Romanoff', role:'Trade Signals',      emoji:'🕸️', color:'#8b5cf6', grade:'S', score:95, quote:'Intel compiled.'},
  {id:'strange',   name:'DR. STRANGE', hero:'Stephen Strange',  role:'Risk Management',    emoji:'🌀', color:'#06b6d4', grade:'A', score:92, quote:'14 million futures…'},
  {id:'hulk',      name:'HULK',        hero:'Bruce Banner',     role:'Backtesting',        emoji:'💪', color:'#22c55e', grade:'B', score:80, quote:'HULK SMASH data!'},
  {id:'warmachine',name:'WAR MACHINE', hero:'James Rhodes',     role:'Trade Journal',      emoji:'🔫', color:'#6b7280', grade:'A', score:88, quote:'Boom! Logged it.'},
  {id:'hawkeye',   name:'HAWKEYE',     hero:'Clint Barton',     role:'Webhook Receiver',   emoji:'🏹', color:'#a855f7', grade:'B', score:84, quote:'I never miss.'},
  {id:'fury',      name:'NICK FURY',   hero:'Nick Fury',        role:'Orchestrator',       emoji:'🏴', color:'#f59e0b', grade:'S', score:97, quote:'Avengers, assemble!'},
];

// ── Tab switching ─────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab-page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`tab-${name}`).classList.add('active');
  event.currentTarget.classList.add('active');
}

// ── Build price cards ─────────────────────────────────────────────
const grid = document.getElementById('price-grid');
const prices = {}, prevPrices = {};
SYMBOLS.forEach(s => {
  prices[s] = null; prevPrices[s] = null;
  const card = document.createElement('div');
  card.className = 'price-card';
  card.id = `card-${s}`;
  card.innerHTML = `
    <div class="card-sym">${s}</div>
    <div class="card-price" id="price-${s}">---</div>
    <div class="card-meta">
      <span class="card-change" id="chg-${s}">--</span>
      <span class="card-session" id="csess-${s}">--</span>
    </div>`;
  grid.appendChild(card);
});

// ── Build agent cards ─────────────────────────────────────────────
const agentGrid = document.getElementById('agent-grid');
AVENGERS.forEach(a => {
  const card = document.createElement('div');
  card.className = 'agent-card';
  card.id = `agent-${a.id}`;
  card.style.borderLeftColor = a.color;
  card.innerHTML = `
    <div class="agent-emoji">${a.emoji}</div>
    <div class="agent-info">
      <div class="agent-name" style="color:${a.color}">${a.name}</div>
      <div class="agent-role">${a.role}</div>
      <div class="agent-quote">"${a.quote}"</div>
    </div>
    <div class="agent-right">
      <div class="grade-badge grade-${a.grade}">${a.grade}</div>
      <div class="score-bar-wrap"><div class="score-bar" style="width:${a.score}%;background:${a.color}"></div></div>
      <div class="score-val">${a.score}/100</div>
      <div class="agent-status online" id="astatus-${a.id}">● ONLINE</div>
    </div>`;
  agentGrid.appendChild(card);
});

// ── Session detection ─────────────────────────────────────────────
function getSession() {
  const now  = new Date();
  const fmt  = new Intl.DateTimeFormat('en-US',{timeZone:'America/New_York',hour:'numeric',minute:'2-digit',hour12:false});
  const [h,m] = fmt.format(now).split(':').map(Number);
  const mins = h * 60 + m;
  const rth    = mins >= 570  && mins < 960;
  const pre    = mins >= 540  && mins < 570;
  const london = mins >= 180  && mins < 720;
  const ny     = mins >= 480  && mins < 1020;
  const tokyo  = mins >= 1140 || mins < 240;
  const sydney = mins >= 1020 || mins < 360;
  return { rth, pre, london, ny, tokyo, sydney, overlap: london && ny };
}

function updateSessionBar() {
  const s = getSession();
  document.getElementById('sess-rth').className    = 'session-chip' + (s.rth ? ' active' : '');
  document.getElementById('sess-pre').className    = 'session-chip' + (s.pre ? ' active' : '');
  document.getElementById('sess-london').className = 'session-chip' + (s.london ? (s.overlap ? ' overlap' : ' active') : '');
  document.getElementById('sess-ny').className     = 'session-chip' + (s.ny     ? (s.overlap ? ' overlap' : ' active') : '');
  document.getElementById('sess-tokyo').className  = 'session-chip' + (s.tokyo  ? ' active' : '');
  document.getElementById('sess-sydney').className = 'session-chip' + (s.sydney ? ' active' : '');
}
updateSessionBar();
setInterval(updateSessionBar, 30000);

// ── WebSocket ─────────────────────────────────────────────────────
const dot  = document.getElementById('status-dot');
const stxt = document.getElementById('status-text');
let ws, reconnectTimer;

function connect() {
  ws = new WebSocket(WS_URL);
  ws.onopen = () => {
    dot.className = 'status-dot live';
    stxt.textContent = 'Live'; stxt.style.color = 'var(--green)';
    SYMBOLS.forEach(sym => ws.send(JSON.stringify({ type:'subscribe', symbol:sym })));
  };
  ws.onmessage = ({ data }) => {
    try { const msg = JSON.parse(data); if (msg.type === 'quote') handleQuote(msg.quote); } catch {}
  };
  ws.onclose = () => {
    dot.className = 'status-dot';
    stxt.textContent = 'Reconnecting…'; stxt.style.color = 'var(--mut)';
    clearTimeout(reconnectTimer);
    reconnectTimer = setTimeout(connect, 3000);
  };
  ws.onerror = () => ws.close();
}

function handleQuote(q) {
  const sym = q.symbol;
  if (!SYMBOLS.includes(sym)) return;
  const prev = prices[sym];
  prices[sym] = q.price;
  const el   = document.getElementById(`price-${sym}`);
  const chg  = document.getElementById(`chg-${sym}`);
  const card = document.getElementById(`card-${sym}`);
  if (!el) return;
  const dir = prev === null ? '' : q.price > prev ? 'up' : q.price < prev ? 'down' : '';
  el.textContent = q.price.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  el.className   = `card-price ${dir}`;
  card.className = `price-card ${dir}`;
  if (prev !== null) {
    const diff = q.price - prev;
    chg.textContent = `${diff>=0?'+':''}${diff.toFixed(2)}`;
    chg.className   = `card-change ${dir}`;
  }
  const sessEl = document.getElementById(`csess-${sym}`);
  if (sessEl) {
    const s = getSession();
    sessEl.textContent = s.rth ? '🔔 RTH' : s.pre ? '🌅 Pre' : '🌙 Overnight';
  }
}

// ── Agent pulse on new alert ──────────────────────────────────────
function pulseAgents() {
  const analyzing = ['ironman','strange','widow','fury'];
  analyzing.forEach(id => {
    const el = document.getElementById(`astatus-${id}`);
    const card = document.getElementById(`agent-${id}`);
    if (!el || !card) return;
    el.textContent = '⚡ ANALYZING'; el.className = 'agent-status analyzing';
    card.classList.add('analyzing');
    setTimeout(() => {
      el.textContent = '● ONLINE'; el.className = 'agent-status online';
      card.classList.remove('analyzing');
    }, 5000);
  });
}

// ── Alerts feed ───────────────────────────────────────────────────
const alertsEl = document.getElementById('alerts-list');
const emptyEl  = document.getElementById('empty-alerts');
let lastAlertCount = 0;

async function fetchAlerts() {
  try {
    const r = await fetch('https://openclaw-production-44a4.up.railway.app/api/alerts/recent');
    if (!r.ok) return;
    const data = await r.json();
    if (!Array.isArray(data) || !data.length) return;
    if (data.length > lastAlertCount) { pulseAgents(); lastAlertCount = data.length; }
    renderAlerts(data.slice(-20).reverse());
    emptyEl.style.display = 'none';
  } catch {}
}

function renderAlerts(alerts) {
  alertsEl.innerHTML = '';
  alertsEl.appendChild(emptyEl);
  alerts.forEach(a => {
    const timeStr = new Date(a.logged_at).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
    const div = document.createElement('div');
    div.className = 'alert-card';
    div.innerHTML = `
      <div class="alert-badge ${a.action}">${ACTION_EMOJI[a.action]??'📊'}</div>
      <div class="alert-body">
        <div class="alert-title">${a.action} · ${a.symbol} @ ${Number(a.price).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
        <div class="alert-sub">${a.strategy??'Signal'} · ${a.session??'--'} · RSI ${a.rsi??'--'}</div>
        ${a.analysis ? `<div class="alert-analysis">🤖 ${a.analysis}</div>` : ''}
      </div>
      <div class="alert-time">${timeStr}</div>`;
    alertsEl.appendChild(div);
  });
}

fetchAlerts();
setInterval(fetchAlerts, 20000);
connect();
</script>
</body>
</html>
