<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>OpenClaw Mobile</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:     #05060f;
    --card:   #0a0c1e;
    --bdr:    #1a1f3a;
    --cyan:   #00d4ff;
    --green:  #00ff88;
    --red:    #ff4444;
    --gold:   #ffd700;
    --mut:    #4a5080;
    --dim:    #8892b0;
    --text:   #ccd6f6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; padding-bottom: 20px; }

  /* ── Header ── */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px;
    background: linear-gradient(135deg, #05060f 0%, #0a0c1e 100%);
    border-bottom: 1px solid var(--bdr);
    position: sticky; top: 0; z-index: 100;
    backdrop-filter: blur(10px);
  }
  .logo { font-family: 'Orbitron', monospace; font-size: 16px; font-weight: 900; color: var(--cyan); letter-spacing: 2px; }
  .logo span { color: var(--gold); }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--mut); transition: background .3s; }
  .status-dot.live { background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

  /* ── Session bar ── */
  .session-bar {
    display: flex; gap: 8px; padding: 10px 16px; overflow-x: auto;
    border-bottom: 1px solid var(--bdr); scrollbar-width: none;
  }
  .session-bar::-webkit-scrollbar { display: none; }
  .session-chip {
    flex-shrink: 0; padding: 4px 10px; border-radius: 20px;
    font-size: 11px; font-weight: 600; border: 1px solid var(--bdr);
    background: var(--card); color: var(--dim); white-space: nowrap;
  }
  .session-chip.active { border-color: var(--green); color: var(--green); background: rgba(0,255,136,.08); }
  .session-chip.overlap { border-color: var(--gold); color: var(--gold); background: rgba(255,215,0,.08); }

  /* ── Price grid ── */
  .section-title { padding: 14px 16px 8px; font-size: 11px; font-weight: 600; color: var(--mut); letter-spacing: 1.5px; text-transform: uppercase; }
  .price-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 16px; }

  .price-card {
    background: var(--card); border: 1px solid var(--bdr); border-radius: 12px;
    padding: 14px 12px; position: relative; overflow: hidden; cursor: default;
    transition: border-color .2s;
  }
  .price-card.up   { border-color: rgba(0,255,136,.3); }
  .price-card.down { border-color: rgba(255,68,68,.3); }
  .price-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: var(--mut); transition: background .3s;
  }
  .price-card.up::before   { background: var(--green); }
  .price-card.down::before { background: var(--red); }

  .card-sym { font-family: 'Orbitron', monospace; font-size: 13px; font-weight: 700; color: var(--cyan); margin-bottom: 6px; }
  .card-price { font-family: 'Orbitron', monospace; font-size: 20px; font-weight: 900; line-height: 1; margin-bottom: 6px; color: var(--text); }
  .card-price.up   { color: var(--green); }
  .card-price.down { color: var(--red); }
  .card-meta { display: flex; justify-content: space-between; align-items: center; }
  .card-change { font-size: 11px; font-weight: 600; }
  .card-change.up   { color: var(--green); }
  .card-change.down { color: var(--red); }
  .card-session { font-size: 10px; color: var(--mut); }

  /* ── Alerts feed ── */
  .alerts-list { display: flex; flex-direction: column; gap: 8px; padding: 0 16px; }
  .alert-card {
    background: var(--card); border: 1px solid var(--bdr); border-radius: 10px;
    padding: 12px 14px; display: flex; gap: 12px; align-items: flex-start;
  }
  .alert-badge {
    width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center;
    justify-content: center; font-size: 16px; flex-shrink: 0;
  }
  .alert-badge.BUY  { background: rgba(0,255,136,.12); }
  .alert-badge.SELL { background: rgba(255,68,68,.12); }
  .alert-badge.NEUTRAL { background: rgba(255,165,0,.12); }
  .alert-body { flex: 1; min-width: 0; }
  .alert-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
  .alert-sub { font-size: 11px; color: var(--dim); }
  .alert-time { font-size: 10px; color: var(--mut); flex-shrink: 0; margin-top: 2px; }

  .empty-state { text-align: center; padding: 30px 16px; color: var(--mut); font-size: 13px; }

  /* ── Nav ── */
  .nav-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    display: flex; background: var(--card); border-top: 1px solid var(--bdr);
    padding: 8px 0 env(safe-area-inset-bottom);
  }
  .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 6px 0; text-decoration: none; color: var(--mut); font-size: 10px; font-weight: 500; transition: color .2s; }
  .nav-item.active, .nav-item:hover { color: var(--cyan); }
  .nav-icon { font-size: 18px; line-height: 1; }
  body { padding-bottom: calc(70px + env(safe-area-inset-bottom)); }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="logo">OPEN<span>CLAW</span></div>
  <div style="display:flex;align-items:center;gap:8px;">
    <span id="status-text" style="font-size:11px;color:var(--mut)">Connecting…</span>
    <div class="status-dot" id="status-dot"></div>
  </div>
</div>

<!-- Session bar -->
<div class="session-bar" id="session-bar">
  <div class="session-chip" id="sess-rth">🔔 RTH</div>
  <div class="session-chip" id="sess-pre">🌅 Pre-Market</div>
  <div class="session-chip" id="sess-london">🇬🇧 London</div>
  <div class="session-chip" id="sess-ny">🗽 New York</div>
  <div class="session-chip" id="sess-tokyo">🗼 Tokyo</div>
  <div class="session-chip" id="sess-sydney">🦘 Sydney</div>
</div>

<!-- Prices -->
<div class="section-title">Live Prices</div>
<div class="price-grid" id="price-grid">
  <!-- cards injected by JS -->
</div>

<!-- Recent Alerts -->
<div class="section-title" style="margin-top:18px;">Recent Alerts</div>
<div class="alerts-list" id="alerts-list">
  <div class="empty-state" id="empty-alerts">Waiting for TradingView signals…</div>
</div>

<!-- Bottom nav -->
<div class="nav-bar">
  <a class="nav-item active" href="mobile.html">
    <span class="nav-icon">📊</span>Prices
  </a>
  <a class="nav-item" href="avengers_hq_unified.html">
    <span class="nav-icon">🖥️</span>Desktop
  </a>
  <a class="nav-item" href="avengers_rimworld.html">
    <span class="nav-icon">🌐</span>Map
  </a>
</div>

<script>
const WS_URL  = 'wss://openclaw-production-44a4.up.railway.app/ws/market';
const SYMBOLS = ['NQ','ES','CL','GC','MNQ','MES'];
const ACTION_EMOJI = { BUY:'🟢', SELL:'🔴', NEUTRAL:'🟡' };

const prices  = {};
const prevPrices = {};
SYMBOLS.forEach(s => { prices[s] = null; prevPrices[s] = null; });

// ── Build price cards ──────────────────────────────────────────────
const grid = document.getElementById('price-grid');
SYMBOLS.forEach(sym => {
  const card = document.createElement('div');
  card.className = 'price-card';
  card.id = `card-${sym}`;
  card.innerHTML = `
    <div class="card-sym">${sym}</div>
    <div class="card-price" id="price-${sym}">---</div>
    <div class="card-meta">
      <span class="card-change" id="chg-${sym}">--</span>
      <span class="card-session" id="sess-${sym}">--</span>
    </div>`;
  grid.appendChild(card);
});

// ── Session detection ──────────────────────────────────────────────
function getSession() {
  const now = new Date();
  const etMin = parseInt(new Intl.DateTimeFormat('en-US',{timeZone:'America/New_York',hour:'numeric',minute:'numeric',hour12:false}).format(now).replace(':',''));
  const h = Math.floor(etMin / 100), m = etMin % 100;
  const mins = h * 60 + m;

  const rth   = mins >= 570 && mins < 960;  // 9:30–16:00
  const pre   = mins >= 540 && mins < 570;  // 9:00–9:30
  const london = (mins >= 180 && mins < 720); // 3AM–12PM ET
  const ny     = (mins >= 480 && mins < 1020);// 8AM–5PM ET
  const tokyoStart = mins < 240;             // midnight–4AM ET
  const tokyo  = tokyoStart || mins >= 1140; // 7PM–4AM ET
  const sydney = mins >= 1020 || mins < 360; // 5PM–6AM ET

  return { rth, pre, london, ny, tokyo, sydney, overlap: london && ny };
}

function updateSessionBar() {
  const s = getSession();
  document.getElementById('sess-rth').className    = 'session-chip' + (s.rth ? ' active' : '');
  document.getElementById('sess-pre').className    = 'session-chip' + (s.pre ? ' active' : '');
  document.getElementById('sess-london').className = 'session-chip' + (s.london ? (s.overlap ? ' overlap' : ' active') : '');
  document.getElementById('sess-ny').className     = 'session-chip' + (s.ny ? (s.overlap ? ' overlap' : ' active') : '');
  document.getElementById('sess-tokyo').className  = 'session-chip' + (s.tokyo ? ' active' : '');
  document.getElementById('sess-sydney').className = 'session-chip' + (s.sydney ? ' active' : '');
}
updateSessionBar();
setInterval(updateSessionBar, 30000);

// ── WebSocket ──────────────────────────────────────────────────────
const dot  = document.getElementById('status-dot');
const stxt = document.getElementById('status-text');
let ws, reconnectTimer;

function connect() {
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    dot.className = 'status-dot live';
    stxt.textContent = 'Live';
    stxt.style.color = 'var(--green)';
    SYMBOLS.forEach(sym => ws.send(JSON.stringify({ type: 'subscribe', symbol: sym })));
  };

  ws.onmessage = ({ data }) => {
    try {
      const msg = JSON.parse(data);
      if (msg.type === 'quote') handleQuote(msg.quote);
    } catch {}
  };

  ws.onclose = () => {
    dot.className = 'status-dot';
    stxt.textContent = 'Reconnecting…';
    stxt.style.color = 'var(--mut)';
    clearTimeout(reconnectTimer);
    reconnectTimer = setTimeout(connect, 3000);
  };

  ws.onerror = () => ws.close();
}

function handleQuote(q) {
  const sym = q.symbol;
  if (!SYMBOLS.includes(sym)) return;

  const prev = prices[sym];
  prices[sym] = q.price;

  const el   = document.getElementById(`price-${sym}`);
  const chg  = document.getElementById(`chg-${sym}`);
  const card = document.getElementById(`card-${sym}`);

  if (!el) return;

  const dir = prev === null ? '' : q.price > prev ? 'up' : q.price < prev ? 'down' : '';
  el.textContent  = q.price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  el.className    = `card-price ${dir}`;
  card.className  = `price-card ${dir}`;

  if (prev !== null) {
    const diff = q.price - prev;
    const sign = diff >= 0 ? '+' : '';
    chg.textContent = `${sign}${diff.toFixed(2)}`;
    chg.className   = `card-change ${dir}`;
  }

  // session label
  const sessEl = document.getElementById(`sess-${sym}`);
  if (sessEl) {
    const s = getSession();
    sessEl.textContent = ['NQ','ES','MNQ','MES','CL','GC'].includes(sym)
      ? (s.rth ? '🔔 RTH' : s.pre ? '🌅 Pre' : '🌙 Overnight')
      : (s.london && s.ny ? '🌍 LN+NY' : s.london ? '🇬🇧 London' : s.ny ? '🗽 NY' : s.tokyo ? '🗼 Tokyo' : '💤');
  }
}

// ── Alerts (polled from webhook endpoint) ─────────────────────────
const MAX_ALERTS = 10;
const alertsEl   = document.getElementById('alerts-list');
const emptyEl    = document.getElementById('empty-alerts');
let   lastAlerts  = [];

async function fetchAlerts() {
  try {
    const r = await fetch('https://openclaw-production-44a4.up.railway.app/api/alerts/recent');
    if (!r.ok) return;
    const data = await r.json();
    if (Array.isArray(data) && data.length) renderAlerts(data.slice(-MAX_ALERTS).reverse());
  } catch {}
}

function renderAlerts(alerts) {
  if (!alerts.length) return;
  emptyEl.style.display = 'none';
  alertsEl.innerHTML = '';
  alerts.forEach(a => {
    const time = new Date(a.logged_at);
    const timeStr = time.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
    const div = document.createElement('div');
    div.className = 'alert-card';
    div.innerHTML = `
      <div class="alert-badge ${a.action}">${ACTION_EMOJI[a.action] ?? '📊'}</div>
      <div class="alert-body">
        <div class="alert-title">${a.action} · ${a.symbol} @ ${Number(a.price).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
        <div class="alert-sub">${a.strategy ?? 'Signal'} · ${a.session ?? '--'} · RSI ${a.rsi ?? '--'}</div>
      </div>
      <div class="alert-time">${timeStr}</div>`;
    alertsEl.appendChild(div);
  });
}

fetchAlerts();
setInterval(fetchAlerts, 30000);

connect();
</script>
</body>
</html>
