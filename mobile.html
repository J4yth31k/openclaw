<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>OpenClaw Mobile</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:   #05060f; --card: #0a0c1e; --bdr: #1a1f3a;
  --cyan: #00d4ff; --green:#00ff88; --red: #ff4444;
  --gold: #ffd700; --mut:  #4a5080; --dim: #8892b0; --text:#ccd6f6;
  --header-h: 52px; --tabbar-h: 44px; --nav-h: 56px;
}
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }

/* ── Shell ── */
html, body { height:100%; overflow:hidden; background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; }
.shell { display:flex; flex-direction:column; height:100%; }

/* ── Header ── */
.header {
  height:var(--header-h); flex-shrink:0;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 16px; background:var(--bg); border-bottom:1px solid var(--bdr); z-index:100;
}
.logo { font-family:'Orbitron',monospace; font-size:15px; font-weight:900; color:var(--cyan); letter-spacing:2px; }
.logo span { color:var(--gold); }
.conn { display:flex; align-items:center; gap:8px; }
.conn-txt { font-size:11px; color:var(--mut); }
.dot { width:8px; height:8px; border-radius:50%; background:var(--mut); transition:background .3s; }
.dot.live { background:var(--green); box-shadow:0 0 8px var(--green); animation:blink 2s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }

/* ── Tab bar ── */
.tab-bar { height:var(--tabbar-h); flex-shrink:0; display:flex; background:var(--card); border-bottom:1px solid var(--bdr); }
.tab-btn { flex:1; font-size:11px; font-weight:700; color:var(--mut); background:none; border:none; border-bottom:2px solid transparent; cursor:pointer; transition:all .2s; letter-spacing:.5px; }
.tab-btn.active { color:var(--cyan); border-bottom-color:var(--cyan); }

/* ── Scrollable content area ── */
.content {
  flex:1; overflow-y:auto; overflow-x:hidden;
  padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom) + 8px);
  -webkit-overflow-scrolling:touch;
}
.tab-page { display:none; }
.tab-page.active { display:block; }

/* ── Section label ── */
.sec {
  padding:12px 14px 5px;
  font-size:9px; font-weight:700; color:var(--mut);
  letter-spacing:1.5px; text-transform:uppercase;
  border-top:1px solid var(--bdr);
}
.sec:first-child { border-top:none; }

/* ── Session chips ── */
.sess-bar { display:flex; gap:8px; padding:8px 14px 10px; overflow-x:auto; border-bottom:1px solid var(--bdr); scrollbar-width:none; }
.sess-bar::-webkit-scrollbar { display:none; }
.chip { flex-shrink:0; padding:4px 10px; border-radius:20px; font-size:10px; font-weight:600; border:1px solid var(--bdr); background:var(--card); color:var(--mut); white-space:nowrap; }
.chip.on  { border-color:var(--green); color:var(--green); background:rgba(0,255,136,.08); }
.chip.ov  { border-color:var(--gold);  color:var(--gold);  background:rgba(255,215,0,.08); }

/* ── Price grid — 2 cols ── */
.pgrid { display:grid; grid-template-columns:1fr 1fr; gap:6px; padding:0 10px 4px; }
.pcard {
  background:var(--card); border:1px solid var(--bdr);
  border-radius:10px; padding:10px; position:relative; overflow:hidden;
  transition:border-color .2s;
}
.pcard.up   { border-color:rgba(0,255,136,.35); }
.pcard.down { border-color:rgba(255,68,68,.35); }
.pcard::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:var(--bdr); transition:background .3s; }
.pcard.up::before   { background:var(--green); }
.pcard.down::before { background:var(--red); }
.psym   { font-family:'Orbitron',monospace; font-size:10px; font-weight:700; color:var(--cyan); margin-bottom:2px; }
.pfull  { font-size:8px; color:var(--mut); margin-bottom:5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.pprice { font-family:'Orbitron',monospace; font-size:16px; font-weight:900; line-height:1; margin-bottom:5px; color:var(--text); }
.pprice.up   { color:var(--green); }
.pprice.down { color:var(--red); }
.pmeta { display:flex; justify-content:space-between; align-items:center; margin-bottom:3px; }
.pchg  { font-size:10px; font-weight:600; color:var(--mut); }
.pchg.up   { color:var(--green); }
.pchg.down { color:var(--red); }
.pvol  { font-size:8px; color:var(--mut); }
.psess { font-size:8px; color:var(--mut); margin-top:1px; }

/* ── Agent list ── */
.agent-list { display:flex; flex-direction:column; gap:8px; padding:0 12px 12px; }
.acard {
  background:var(--card); border:1px solid var(--bdr); border-left:3px solid; border-radius:10px;
  padding:12px; display:flex; align-items:center; gap:12px; transition:box-shadow .3s;
}
.acard.analyzing { box-shadow:0 0 14px rgba(0,212,255,.25); animation:glow .8s ease-in-out infinite alternate; }
@keyframes glow { from{box-shadow:0 0 4px rgba(0,212,255,.1)} to{box-shadow:0 0 16px rgba(0,212,255,.35)} }
.aemoji { font-size:24px; width:36px; text-align:center; flex-shrink:0; }
.ainfo  { flex:1; min-width:0; }
.aname  { font-family:'Orbitron',monospace; font-size:10px; font-weight:700; letter-spacing:.8px; margin-bottom:2px; }
.arole  { font-size:10px; color:var(--dim); margin-bottom:3px; }
.aquote { font-size:9px; color:var(--mut); font-style:italic; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.aright { display:flex; flex-direction:column; align-items:flex-end; gap:3px; flex-shrink:0; }
.grade  { font-family:'Orbitron',monospace; font-size:16px; font-weight:900; }
.grade.S { color:var(--gold); } .grade.A { color:var(--green); } .grade.B { color:var(--cyan); }
.sbar-wrap { width:48px; height:3px; background:var(--bdr); border-radius:2px; overflow:hidden; }
.sbar      { height:100%; border-radius:2px; }
.sval      { font-size:9px; color:var(--mut); }
.astatus   { font-size:9px; padding:2px 6px; border-radius:10px; font-weight:700; }
.astatus.on  { background:rgba(0,255,136,.12); color:var(--green); }
.astatus.run { background:rgba(0,212,255,.12); color:var(--cyan); }

/* ── Alerts ── */
.alist  { display:flex; flex-direction:column; gap:8px; padding:0 12px 12px; }
.alcard { background:var(--card); border:1px solid var(--bdr); border-radius:10px; padding:12px; display:flex; gap:10px; align-items:flex-start; }
.albadge { width:34px; height:34px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:15px; flex-shrink:0; }
.albadge.BUY     { background:rgba(0,255,136,.12); }
.albadge.SELL    { background:rgba(255,68,68,.12); }
.albadge.NEUTRAL { background:rgba(255,165,0,.12); }
.albody   { flex:1; min-width:0; }
.altitle  { font-size:13px; font-weight:600; margin-bottom:2px; }
.alsub    { font-size:10px; color:var(--dim); margin-bottom:3px; }
.alai     { font-size:10px; color:var(--mut); font-style:italic; overflow:hidden; text-overflow:ellipsis; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; }
.altime   { font-size:9px; color:var(--mut); flex-shrink:0; padding-top:2px; }
.empty    { text-align:center; padding:30px 16px; color:var(--mut); font-size:13px; }

/* ── Bottom nav ── */
.nav { position:fixed; bottom:0; left:0; right:0; height:calc(var(--nav-h) + env(safe-area-inset-bottom)); background:var(--card); border-top:1px solid var(--bdr); display:flex; align-items:flex-start; z-index:200; padding-top:6px; }
.nitem { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; text-decoration:none; color:var(--mut); font-size:9px; font-weight:600; padding:4px 0; transition:color .2s; letter-spacing:.3px; }
.nitem.here, .nitem:hover { color:var(--cyan); }
.nico { font-size:19px; line-height:1; }
</style>
</head>
<body>
<div class="shell">

  <!-- Header -->
  <div class="header">
    <div class="logo">OPEN<span>CLAW</span></div>
    <div class="conn">
      <span class="conn-txt" id="conn-txt">Connecting…</span>
      <div class="dot" id="dot"></div>
    </div>
  </div>

  <!-- Tab bar -->
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="prices">📊 DATA CENTER</button>
    <button class="tab-btn"        data-tab="agents">🦾 AGENTS</button>
    <button class="tab-btn"        data-tab="alerts">🔔 ALERTS</button>
  </div>

  <!-- Scrollable content -->
  <div class="content">

    <!-- DATA CENTER (prices) -->
    <div class="tab-page active" id="tab-prices">
      <div class="sess-bar">
        <div class="chip" id="c-rth">🔔 RTH</div>
        <div class="chip" id="c-pre">🌅 Pre-Mkt</div>
        <div class="chip" id="c-lon">🇬🇧 London</div>
        <div class="chip" id="c-ny">🗽 New York</div>
        <div class="chip" id="c-tok">🗼 Tokyo</div>
        <div class="chip" id="c-syd">🦘 Sydney</div>
      </div>
      <div id="price-sections"></div>
    </div>

    <!-- AGENTS -->
    <div class="tab-page" id="tab-agents">
      <div class="sec" style="border-top:none">Agent Network · 12 Operational</div>
      <div class="agent-list" id="agent-list"></div>
    </div>

    <!-- ALERTS -->
    <div class="tab-page" id="tab-alerts">
      <div class="sec" style="border-top:none">Recent Signals</div>
      <div class="alist" id="alist">
        <div class="empty" id="empty">Waiting for TradingView signals…</div>
      </div>
    </div>

  </div><!-- /content -->
</div><!-- /shell -->

<!-- Bottom nav -->
<div class="nav">
  <a class="nitem here" href="mobile.html"><span class="nico">📱</span>Mobile</a>
  <a class="nitem" href="avengers_hq_unified.html"><span class="nico">🖥️</span>Desktop</a>
  <a class="nitem" href="avengers_rimworld.html"><span class="nico">🌐</span>Map</a>
</div>

<script>
const WS = 'wss://openclaw-production-44a4.up.railway.app/ws/market';

// ── Market categories ─────────────────────────────────────────────────────────
const CATEGORIES = [
  {
    label: '📈 Index Futures',
    syms: [
      { sym:'NQ',  name:'Nasdaq 100'   },
      { sym:'ES',  name:'S&P 500'      },
      { sym:'YM',  name:'Dow Jones'    },
      { sym:'RTY', name:'Russell 2000' },
      { sym:'MNQ', name:'Micro NQ'     },
      { sym:'MES', name:'Micro ES'     },
    ]
  },
  {
    label: '🛢️ Commodity Futures',
    syms: [
      { sym:'CL',  name:'Crude Oil'    },
      { sym:'NG',  name:'Natural Gas'  },
      { sym:'GC',  name:'Gold'         },
      { sym:'SI',  name:'Silver'       },
      { sym:'HG',  name:'Copper'       },
    ]
  },
  {
    label: '📜 Bond Futures',
    syms: [
      { sym:'ZB',  name:'30Y T-Bond'   },
      { sym:'ZN',  name:'10Y T-Note'   },
      { sym:'ZF',  name:'5Y T-Note'    },
    ]
  },
  {
    label: '💱 FX Futures',
    syms: [
      { sym:'6E',  name:'Euro'         },
      { sym:'6B',  name:'British Pound'},
      { sym:'6J',  name:'Japanese Yen' },
      { sym:'6A',  name:'Aussie Dollar'},
    ]
  },
  {
    label: '🪙 Crypto',
    syms: [
      { sym:'BTCUSD', name:'Bitcoin'   },
      { sym:'ETHUSD', name:'Ethereum'  },
    ]
  },
];

const ALL_SYMS = CATEGORIES.flatMap(c => c.syms.map(s => s.sym));
const A_EMOJI  = { BUY:'🟢', SELL:'🔴', NEUTRAL:'🟡' };

// ── Build price sections ───────────────────────────────────────────────────────
const prices = {};
const sections = document.getElementById('price-sections');

CATEGORIES.forEach((cat, ci) => {
  const secDiv = document.createElement('div');
  secDiv.className = 'sec';
  if (ci === 0) secDiv.style.borderTop = 'none';
  secDiv.textContent = cat.label;
  sections.appendChild(secDiv);

  const grid = document.createElement('div');
  grid.className = 'pgrid';
  sections.appendChild(grid);

  cat.syms.forEach(({ sym, name }) => {
    prices[sym] = null;
    grid.insertAdjacentHTML('beforeend', `
      <div class="pcard" id="pc-${sym}">
        <div class="psym">${sym}</div>
        <div class="pfull">${name}</div>
        <div class="pprice" id="pp-${sym}">---</div>
        <div class="pmeta">
          <span class="pchg" id="pch-${sym}">--</span>
          <span class="pvol" id="pvol-${sym}"></span>
        </div>
        <div class="psess" id="pse-${sym}">--</div>
      </div>`);
  });
});

// ── Agents ────────────────────────────────────────────────────────────────────
const AGENTS = [
  {id:'ironman',   name:'IRON MAN',    hero:'Tony Stark',       role:'Technical Analysis', emoji:'🦾', color:'#ef4444', grade:'S', score:96, quote:'JARVIS, run the scan.'},
  {id:'captain',   name:'CAPTAIN',     hero:'Steve Rogers',     role:'Fundamentals',       emoji:'🛡️', color:'#3b82f6', grade:'A', score:89, quote:'I can do this all day.'},
  {id:'scarlet',   name:'SCARLET',     hero:'Wanda Maximoff',   role:'Sentiment',          emoji:'🔮', color:'#ec4899', grade:'A', score:87, quote:'I read their minds.'},
  {id:'thor',      name:'THOR',        hero:'Thor Odinson',     role:'Correlations',       emoji:'⚡', color:'#eab308', grade:'B', score:82, quote:'Bring me Thanos!'},
  {id:'vision',    name:'VISION',      hero:'Vision',           role:'Order Flow',         emoji:'👁️', color:'#10b981', grade:'A', score:91, quote:'I am processing.'},
  {id:'spiderman', name:'SPIDER-MAN',  hero:'Peter Parker',     role:'News & Events',      emoji:'🕷️', color:'#ef4444', grade:'B', score:78, quote:'My spider-sense!'},
  {id:'widow',     name:'BLACK WIDOW', hero:'Natasha Romanoff', role:'Trade Signals',      emoji:'🕸️', color:'#8b5cf6', grade:'S', score:95, quote:'Intel compiled.'},
  {id:'strange',   name:'DR. STRANGE', hero:'Stephen Strange',  role:'Risk Management',    emoji:'🌀', color:'#06b6d4', grade:'A', score:92, quote:'14 million futures…'},
  {id:'hulk',      name:'HULK',        hero:'Bruce Banner',     role:'Backtesting',        emoji:'💪', color:'#22c55e', grade:'B', score:80, quote:'HULK SMASH data!'},
  {id:'warmachine',name:'WAR MACHINE', hero:'James Rhodes',     role:'Trade Journal',      emoji:'🔫', color:'#6b7280', grade:'A', score:88, quote:'Boom! Logged it.'},
  {id:'hawkeye',   name:'HAWKEYE',     hero:'Clint Barton',     role:'Webhook Receiver',   emoji:'🏹', color:'#a855f7', grade:'B', score:84, quote:'I never miss.'},
  {id:'fury',      name:'NICK FURY',   hero:'Nick Fury',        role:'Orchestrator',       emoji:'🏴', color:'#f59e0b', grade:'S', score:97, quote:'Avengers, assemble!'},
];

const agentList = document.getElementById('agent-list');
AGENTS.forEach(a => {
  agentList.insertAdjacentHTML('beforeend', `
    <div class="acard" id="ac-${a.id}" style="border-left-color:${a.color}">
      <div class="aemoji">${a.emoji}</div>
      <div class="ainfo">
        <div class="aname" style="color:${a.color}">${a.name}</div>
        <div class="arole">${a.role}</div>
        <div class="aquote">"${a.quote}"</div>
      </div>
      <div class="aright">
        <div class="grade ${a.grade}">${a.grade}</div>
        <div class="sbar-wrap"><div class="sbar" style="width:${a.score}%;background:${a.color}"></div></div>
        <div class="sval">${a.score}/100</div>
        <div class="astatus on" id="as-${a.id}">● ONLINE</div>
      </div>
    </div>`);
});

// ── Tabs ──────────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-page').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
    document.querySelector('.content').scrollTop = 0;
  });
});

// ── Sessions ──────────────────────────────────────────────────────────────────
function sessions() {
  const fmt = new Intl.DateTimeFormat('en-US',{timeZone:'America/New_York',hour:'numeric',minute:'2-digit',hour12:false});
  const [h,m] = fmt.format(new Date()).split(':').map(Number);
  const t = h*60+m;
  return {
    rth:   t>=570&&t<960,
    pre:   t>=540&&t<570,
    lon:   t>=180&&t<720,
    ny:    t>=480&&t<1020,
    tok:   t>=1140||t<240,
    syd:   t>=1020||t<360,
    ovlap: t>=480&&t<720
  };
}
function updateSessions() {
  const s = sessions();
  const chip = (id, on, ov) => { const el = document.getElementById(id); if(el) el.className = `chip${ov?' ov':on?' on':''}`; };
  chip('c-rth', s.rth,  false);
  chip('c-pre', s.pre,  false);
  chip('c-lon', s.lon,  s.ovlap);
  chip('c-ny',  s.ny,   s.ovlap);
  chip('c-tok', s.tok,  false);
  chip('c-syd', s.syd,  false);
}
updateSessions();
setInterval(updateSessions, 30000);

// ── WebSocket ─────────────────────────────────────────────────────────────────
const dot  = document.getElementById('dot');
const ctxt = document.getElementById('conn-txt');
let ws, rtimer;

function connect() {
  ws = new WebSocket(WS);
  ws.onopen = () => {
    dot.className = 'dot live';
    ctxt.textContent = 'Live'; ctxt.style.color = 'var(--green)';
    ALL_SYMS.forEach(s => ws.send(JSON.stringify({type:'subscribe', symbol:s})));
  };
  ws.onmessage = ({data}) => {
    try { const m = JSON.parse(data); if (m.type === 'quote') onQuote(m.quote); } catch {}
  };
  ws.onclose = () => {
    dot.className = 'dot';
    ctxt.textContent = 'Reconnecting…'; ctxt.style.color = 'var(--mut)';
    clearTimeout(rtimer); rtimer = setTimeout(connect, 3000);
  };
  ws.onerror = () => ws.close();
}

function fmtVol(v) {
  if (!v) return '';
  if (v >= 1_000_000) return `${(v/1_000_000).toFixed(1)}M`;
  if (v >= 1_000)     return `${(v/1_000).toFixed(0)}K`;
  return String(v);
}

function onQuote(q) {
  if (!ALL_SYMS.includes(q.symbol)) return;
  const prev = prices[q.symbol];
  prices[q.symbol] = q.price;
  const dir = prev === null ? '' : q.price > prev ? 'up' : q.price < prev ? 'down' : '';
  const decimals = q.price < 10 ? 4 : q.price < 100 ? 3 : 2;
  const fmt = q.price.toLocaleString('en-US',{minimumFractionDigits:decimals, maximumFractionDigits:decimals});

  const pp   = document.getElementById(`pp-${q.symbol}`);
  const pch  = document.getElementById(`pch-${q.symbol}`);
  const pc   = document.getElementById(`pc-${q.symbol}`);
  const pse  = document.getElementById(`pse-${q.symbol}`);
  const pvol = document.getElementById(`pvol-${q.symbol}`);

  if (pp)  { pp.textContent = fmt; pp.className = `pprice${dir ? ' '+dir : ''}`; }
  if (pc)    pc.className = `pcard${dir ? ' '+dir : ''}`;
  if (pch && prev !== null) {
    const d = q.price - prev;
    pch.textContent = `${d>=0?'+':''}${d.toFixed(decimals)}`; pch.className = `pchg${dir ? ' '+dir : ''}`;
  }
  if (pvol && q.volume) pvol.textContent = `Vol ${fmtVol(q.volume)}`;
  if (pse) {
    const s = sessions();
    pse.textContent = s.rth ? '🔔 RTH' : s.pre ? '🌅 Pre-Mkt' : '🌙 Overnight';
  }
}

// ── Agent pulse on new alert ───────────────────────────────────────────────────
function pulseAgents() {
  ['ironman','strange','widow','fury'].forEach(id => {
    const st = document.getElementById(`as-${id}`);
    const ac = document.getElementById(`ac-${id}`);
    if (!st||!ac) return;
    st.textContent = '⚡ ANALYZING'; st.className = 'astatus run';
    ac.classList.add('analyzing');
    setTimeout(() => {
      st.textContent = '● ONLINE'; st.className = 'astatus on';
      ac.classList.remove('analyzing');
    }, 5000);
  });
}

// ── Alerts feed ───────────────────────────────────────────────────────────────
const alertsEl = document.getElementById('alist');
const emptyEl  = document.getElementById('empty');
let lastCount  = 0;

async function fetchAlerts() {
  try {
    const r = await fetch('https://openclaw-production-44a4.up.railway.app/api/alerts/recent');
    if (!r.ok) return;
    const data = await r.json();
    if (!Array.isArray(data) || !data.length) return;
    if (data.length > lastCount) { pulseAgents(); lastCount = data.length; }
    emptyEl.style.display = 'none';
    alertsEl.querySelectorAll('.alcard').forEach(el => el.remove());
    data.slice(-25).reverse().forEach(a => {
      const t = new Date(a.logged_at).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
      const p = Number(a.price).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
      const indLine = [
        a.stoch_k != null    ? `StochK ${a.stoch_k.toFixed(0)}` : (a.rsi != null ? `RSI ${a.rsi}` : null),
        a.ribbon_bull != null ? (a.ribbon_bull ? 'Ribbon ▲' : 'Ribbon ▼') : null,
        a.squeeze === true    ? '🟡 Squeeze' : null,
        a.vol_ratio != null && a.vol_ratio > 1.5 ? `RVOL ${a.vol_ratio.toFixed(1)}x` : null,
      ].filter(Boolean).join(' · ');
      alertsEl.insertAdjacentHTML('beforeend', `
        <div class="alcard">
          <div class="albadge ${a.action}">${A_EMOJI[a.action]??'📊'}</div>
          <div class="albody">
            <div class="altitle">${a.action} · ${a.symbol} @ ${p}</div>
            <div class="alsub">${a.strategy??'Signal'} · ${a.session??'--'}${indLine ? ' · '+indLine : ''}</div>
            ${a.analysis ? `<div class="alai">🤖 ${a.analysis}</div>` : ''}
          </div>
          <div class="altime">${t}</div>
        </div>`);
    });
  } catch {}
}

fetchAlerts();
setInterval(fetchAlerts, 20000);
connect();
</script>
</body>
</html>
