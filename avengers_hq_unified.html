<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>OpenClaw — Avengers HQ Command Center</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=JetBrains+Mono:wght@300;400;500&family=Inter:wght@300;400;500;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#06060c;--bg2:#0a0a14;--bg3:#0e0e1a;--card:rgba(10,10,20,0.94);
  --bdr:rgba(74,108,247,0.12);--txt:#d8d8e8;--dim:#4a4a6a;--mut:#7a7a9a;
  --blue:#4a6cf7;--purple:#7c3aed;--cyan:#06b6d4;--green:#10b981;
  --red:#ef4444;--orange:#f59e0b;--pink:#ec4899;--yellow:#eab308;
  --gold:#d4a017;--teal:#14b8a6;
}
body{background:var(--bg);color:var(--txt);font-family:'Inter',sans-serif;overflow:hidden;height:100vh;display:flex;flex-direction:column;-webkit-tap-highlight-color:transparent;}

/* ===== TOP BAR ===== */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:var(--bg2);border-bottom:1px solid var(--bdr);z-index:60;flex-shrink:0;height:36px;}
.tb-left{display:flex;align-items:center;gap:12px;}
.tb-logo{font-family:'Orbitron',monospace;font-size:12px;font-weight:700;letter-spacing:3px;background:linear-gradient(90deg,var(--blue),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.tb-sep{width:1px;height:18px;background:var(--bdr);}
.tb-clock{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim);}
.tb-dot{width:5px;height:5px;border-radius:50%;background:var(--green);display:inline-block;margin-right:4px;animation:dp 2s infinite;}
@keyframes dp{0%,100%{opacity:1;}50%{opacity:.3;}}
@keyframes assemble-pulse{0%,100%{box-shadow:0 0 6px rgba(245,158,11,0.2);}50%{box-shadow:0 0 18px rgba(245,158,11,0.5);}}
.tb-right{display:flex;align-items:center;gap:8px;}
.tb-session{font-family:'JetBrains Mono',monospace;font-size:9px;padding:2px 8px;border-radius:4px;border:1px solid var(--bdr);}
.tb-fps{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--dim);}
.tb-assemble{font-family:'Orbitron',monospace;font-size:8px;font-weight:700;letter-spacing:1px;padding:2px 10px;border-radius:4px;border:1px solid rgba(245,158,11,0.3);background:rgba(245,158,11,0.06);color:#f59e0b;cursor:pointer;transition:all .2s;text-transform:uppercase;}
.tb-assemble:hover{background:rgba(245,158,11,0.15);border-color:rgba(245,158,11,0.6);box-shadow:0 0 12px rgba(245,158,11,0.2);}
.tb-assemble.active{background:rgba(245,158,11,0.25);border-color:#f59e0b;color:#fbbf24;animation:assemble-pulse 1s infinite;}
.tb-prices{display:flex;gap:10px;font-family:'JetBrains Mono',monospace;font-size:9px;}
.tb-price{display:flex;align-items:center;gap:3px;}
.tb-price .sym{color:var(--dim);}
.tb-price .val{color:var(--txt);}
.tb-price .chg{font-size:8px;}
.tb-price .chg.up{color:var(--green);}
.tb-price .chg.dn{color:var(--red);}

/* ===== MAIN SPLIT ===== */
.main-area{flex:1;display:flex;overflow:hidden;}

/* ===== LEFT: COLONY MAP ===== */
.colony-map{flex:1;position:relative;overflow:hidden;background:var(--bg);}
.colony-map canvas{display:block;width:100%;height:100%;}
.room-tooltip{position:absolute;z-index:30;pointer-events:none;opacity:0;transition:opacity .15s;background:var(--card);border:1px solid var(--bdr);border-radius:8px;padding:8px 12px;backdrop-filter:blur(12px);max-width:220px;}
.room-tooltip.visible{opacity:1;}
.room-tooltip .rt-name{font-family:'Orbitron',monospace;font-size:10px;font-weight:700;letter-spacing:1px;}
.room-tooltip .rt-role{font-size:9px;color:var(--dim);margin-bottom:4px;}
.room-tooltip .rt-data{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--mut);}
.room-tooltip .rt-data b{color:var(--txt);}

/* ===== RIGHT: DATA CENTER ===== */
.data-center{width:380px;flex-shrink:0;display:flex;flex-direction:column;border-left:1px solid var(--bdr);background:var(--bg2);overflow:hidden;}

/* Agent Cards Grid */
.agent-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;padding:6px;border-bottom:1px solid var(--bdr);flex-shrink:0;}
.ag-card{padding:5px;border-radius:6px;border:1px solid var(--bdr);background:rgba(0,0,0,0.25);cursor:pointer;transition:all .15s;text-align:center;position:relative;overflow:hidden;}
.ag-card:hover{border-color:var(--cyan);background:rgba(6,182,212,0.04);}
.ag-card.selected{border-color:var(--blue);background:rgba(74,108,247,0.08);}
.ag-card .ag-emo{font-size:16px;display:block;margin-bottom:1px;}
.ag-card .ag-name{font-family:'Orbitron',monospace;font-size:6px;font-weight:600;letter-spacing:0.5px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ag-card .ag-grade{font-family:'Orbitron',monospace;font-size:10px;font-weight:900;position:absolute;top:2px;right:3px;}
.ag-card .ag-bar{height:2px;border-radius:2px;background:rgba(255,255,255,0.05);margin-top:2px;overflow:hidden;}
.ag-card .ag-bar-fill{height:100%;border-radius:2px;transition:width .5s;}

/* Data Tabs */
.dt-tabs{display:flex;border-bottom:1px solid var(--bdr);flex-shrink:0;}
.dt-tab{flex:1;font-family:'Orbitron',monospace;font-size:7px;letter-spacing:1px;text-align:center;padding:6px 2px;cursor:pointer;color:var(--dim);border-bottom:2px solid transparent;transition:all .2s;}
.dt-tab.active{color:var(--cyan);border-bottom-color:var(--cyan);background:rgba(6,182,212,0.04);}
.dt-tab:hover{color:var(--txt);}
.dt-content{flex:1;overflow-y:auto;overflow-x:hidden;}
.dt-section{display:none;padding:8px;}
.dt-section.active{display:block;}

/* Chart Panel */
.chart-wrap{width:100%;height:180px;position:relative;margin-bottom:8px;}
.chart-wrap canvas{width:100%;height:100%;border-radius:6px;border:1px solid var(--bdr);}
.pair-selector{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:6px;}
.pair-btn{font-family:'JetBrains Mono',monospace;font-size:8px;padding:2px 6px;border-radius:3px;background:rgba(255,255,255,0.03);color:var(--dim);cursor:pointer;border:1px solid transparent;transition:all .15s;}
.pair-btn.active{color:var(--cyan);border-color:rgba(6,182,212,0.3);background:rgba(6,182,212,0.06);}
.price-display{display:flex;align-items:baseline;gap:8px;margin-bottom:6px;}
.price-display .pd-price{font-family:'Orbitron',monospace;font-size:20px;font-weight:900;}
.price-display .pd-chg{font-family:'JetBrains Mono',monospace;font-size:11px;}

/* Signal Cards */
.sig-card{padding:8px;border-radius:6px;border:1px solid var(--bdr);margin-bottom:6px;background:rgba(0,0,0,0.2);}
.sig-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.sig-dir{font-family:'Orbitron',monospace;font-size:10px;font-weight:800;letter-spacing:1px;padding:1px 8px;border-radius:4px;}
.sig-dir.long{color:var(--green);background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.2);}
.sig-dir.short{color:var(--red);background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);}
.sig-pair{font-family:'Orbitron',monospace;font-size:12px;font-weight:700;}
.sig-score{font-family:'Orbitron',monospace;font-size:14px;font-weight:900;}
.sig-row{display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--dim);padding:1px 0;}
.sig-row .val{color:var(--txt);}
.sig-strat{font-family:'JetBrains Mono',monospace;font-size:8px;padding:1px 5px;border-radius:3px;background:rgba(124,58,237,0.1);color:var(--purple);display:inline-block;margin-top:3px;}
.sig-invalidation{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--orange);margin-top:2px;}

/* Sessions Panel */
.ses-row{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.02);}
.ses-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.ses-dot.on{background:var(--green);box-shadow:0 0 6px var(--green);}
.ses-dot.off{background:var(--dim);}
.ses-name{font-family:'Orbitron',monospace;font-size:9px;font-weight:600;letter-spacing:1px;flex:1;}
.ses-time{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--dim);}
.ses-pairs{font-family:'JetBrains Mono',monospace;font-size:7px;color:var(--mut);margin-top:2px;}

/* Flow Panel */
.flow-card{padding:6px;border-radius:6px;border:1px solid var(--bdr);margin-bottom:5px;background:rgba(0,0,0,0.2);}
.flow-title{font-family:'Orbitron',monospace;font-size:8px;font-weight:600;letter-spacing:1px;color:var(--purple);margin-bottom:3px;}
.flow-row{display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--dim);padding:1px 0;}
.flow-row .val{color:var(--txt);}
.flow-bar{height:8px;background:rgba(255,255,255,0.03);border-radius:3px;overflow:hidden;display:flex;margin:2px 0;}
.flow-bid{background:var(--green);height:100%;transition:width .5s;}
.flow-ask{background:var(--red);height:100%;transition:width .5s;}

/* News Panel */
.news-item{padding:6px;border-radius:6px;border:1px solid var(--bdr);margin-bottom:5px;background:rgba(0,0,0,0.2);}
.news-time{font-family:'JetBrains Mono',monospace;font-size:7px;color:var(--dim);}
.news-title{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--txt);margin:2px 0;}
.news-score{font-family:'Orbitron',monospace;font-size:9px;font-weight:700;}

/* Report Panel */
.report-box{font-family:'JetBrains Mono',monospace;font-size:9px;line-height:1.7;color:var(--mut);white-space:pre-wrap;}
.report-box .rh{font-weight:600;color:var(--txt);font-size:10px;}
.report-box .buy{color:var(--green);}
.report-box .sell{color:var(--red);}
.report-box .warn{color:var(--orange);}
.report-box .info{color:var(--cyan);}

/* Grade Panel */
.grade-card{padding:8px;border-radius:6px;border:1px solid var(--bdr);margin-bottom:5px;background:rgba(0,0,0,0.2);}
.grade-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.grade-agent{font-family:'Orbitron',monospace;font-size:10px;font-weight:700;letter-spacing:1px;}
.grade-letter{font-family:'Orbitron',monospace;font-size:18px;font-weight:900;}
.grade-cats{display:grid;grid-template-columns:1fr 1fr;gap:2px 8px;}
.grade-cat{display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--dim);}
.grade-cat .val{color:var(--txt);}

/* Journal Panel */
.journal-entry{padding:6px;border-radius:6px;border:1px solid var(--bdr);margin-bottom:5px;background:rgba(0,0,0,0.2);font-family:'JetBrains Mono',monospace;font-size:9px;}
.journal-id{font-family:'Orbitron',monospace;font-size:8px;color:var(--cyan);margin-bottom:2px;}
.journal-row{display:flex;justify-content:space-between;color:var(--dim);padding:1px 0;}
.journal-row .val{color:var(--txt);}
.journal-outcome{font-family:'Orbitron',monospace;font-size:10px;font-weight:700;margin-top:3px;}

/* ===== BOTTOM BAR ===== */
.bottombar{display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:var(--bg2);border-top:1px solid var(--bdr);z-index:60;flex-shrink:0;height:28px;}
.bb-feed{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--dim);flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.bb-stats{display:flex;gap:14px;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--dim);}
.bb-stats b{color:var(--txt);margin-left:3px;}

/* ===== MOBILE ===== */
@media(max-width:900px){
  .data-center{width:100%;border-left:none;border-top:1px solid var(--bdr);}
  .main-area{flex-direction:column;}
  .colony-map{flex:none;height:45vh;}
  .agent-cards{grid-template-columns:repeat(6,1fr);}
  .bottombar{display:none;}
  .tb-prices{display:none;}
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="tb-left">
    <span class="tb-logo">OPENCLAW</span>
    <div class="tb-sep"></div>
    <span class="tb-clock"><span class="tb-dot"></span><span id="clock">--:--:-- UTC</span></span>
    <div class="tb-sep"></div>
    <span class="tb-session" id="sessionBadge">--</span>
  </div>
  <div class="tb-right">
    <div class="tb-prices" id="topPrices"></div>
    <div class="tb-sep"></div>
    <button class="tb-assemble" id="assembleBtn" onclick="toggleAssemble()">⚡ ASSEMBLE</button>
    <div class="tb-sep"></div>
    <span class="tb-fps" id="fpsCounter">-- FPS</span>
  </div>
</div>

<!-- MAIN AREA -->
<div class="main-area">

  <!-- LEFT: Colony Map with Individual Rooms -->
  <div class="colony-map">
    <canvas id="colonyCanvas"></canvas>
    <div class="room-tooltip" id="roomTooltip">
      <div class="rt-name"></div>
      <div class="rt-role"></div>
      <div class="rt-data"></div>
    </div>
  </div>

  <!-- RIGHT: Data Center -->
  <div class="data-center">
    <!-- Agent Status Cards -->
    <div class="agent-cards" id="agentCards"></div>

    <!-- Data Tabs -->
    <div class="dt-tabs" id="dtTabs">
      <div class="dt-tab active" data-tab="chart">CHART</div>
      <div class="dt-tab" data-tab="signals">SIGNALS</div>
      <div class="dt-tab" data-tab="sessions">SESSION</div>
      <div class="dt-tab" data-tab="flow">FLOW</div>
      <div class="dt-tab" data-tab="news">NEWS</div>
      <div class="dt-tab" data-tab="grades">GRADES</div>
      <div class="dt-tab" data-tab="journal">JOURNAL</div>
      <div class="dt-tab" data-tab="report">REPORT</div>
    </div>

    <!-- Tab Content -->
    <div class="dt-content">
      <div class="dt-section active" id="tab-chart">
        <div class="pair-selector" id="pairSelector"></div>
        <div class="price-display">
          <span class="pd-price" id="pdPrice">--</span>
          <span class="pd-chg" id="pdChg"></span>
        </div>
        <div class="chart-wrap"><canvas id="chartCanvas"></canvas></div>
      </div>
      <div class="dt-section" id="tab-signals"><div id="signalsList"></div></div>
      <div class="dt-section" id="tab-sessions"><div id="sessionsList"></div></div>
      <div class="dt-section" id="tab-flow"><div id="flowList"></div></div>
      <div class="dt-section" id="tab-news"><div id="newsList"></div></div>
      <div class="dt-section" id="tab-grades"><div id="gradesList"></div></div>
      <div class="dt-section" id="tab-journal"><div id="journalList"></div></div>
      <div class="dt-section" id="tab-report"><div class="report-box" id="reportBox">Loading briefing...</div></div>
    </div>
  </div>
</div>

<!-- BOTTOM BAR -->
<div class="bottombar">
  <div class="bb-feed" id="bbFeed">Avengers HQ online — all systems nominal</div>
  <div class="bb-stats">
    <span>Agents<b id="bbAgents">12</b></span>
    <span>Signals<b id="bbSignals">0</b></span>
    <span>Confluence<b id="bbConfl">--</b></span>
    <span>Team<b id="bbTeamGrade">--</b></span>
  </div>
</div>

<script>
// ============================================================
// AVENGERS DATA
// ============================================================
const AVENGERS = [
  {id:'ironman',name:'IRON MAN',hero:'Tony Stark',role:'Technical Analysis',emoji:'🦾',
   color:'#ef4444',accent:'#ff6b6b',roomTheme:'tech_lab',
   quote:'JARVIS, run the scan.',grade:'S',score:96},
  {id:'captain',name:'CAPTAIN',hero:'Steve Rogers',role:'Fundamentals',emoji:'🛡️',
   color:'#3b82f6',accent:'#60a5fa',roomTheme:'command_room',
   quote:'I can do this all day.',grade:'A',score:89},
  {id:'scarlet',name:'SCARLET',hero:'Wanda Maximoff',role:'Sentiment',emoji:'🔮',
   color:'#ec4899',accent:'#f472b6',roomTheme:'mystic_chamber',
   quote:'I read their minds.',grade:'A',score:87},
  {id:'thor',name:'THOR',hero:'Thor Odinson',role:'Correlations',emoji:'⚡',
   color:'#eab308',accent:'#facc15',roomTheme:'asgard_hall',
   quote:'Bring me Thanos!',grade:'B',score:82},
  {id:'vision',name:'VISION',hero:'Vision',role:'Order Flow',emoji:'👁️',
   color:'#10b981',accent:'#34d399',roomTheme:'data_core',
   quote:'I am processing.',grade:'A',score:91},
  {id:'spiderman',name:'SPIDER-MAN',hero:'Peter Parker',role:'News & Events',emoji:'🕷️',
   color:'#ef4444',accent:'#f87171',roomTheme:'web_den',
   quote:'My spider-sense!',grade:'B',score:78},
  {id:'widow',name:'BLACK WIDOW',hero:'Natasha Romanoff',role:'Trade Signals',emoji:'🕸️',
   color:'#8b5cf6',accent:'#a78bfa',roomTheme:'intel_room',
   quote:'Intel compiled.',grade:'S',score:95},
  {id:'strange',name:'DR. STRANGE',hero:'Stephen Strange',role:'Risk Mgmt',emoji:'🌀',
   color:'#06b6d4',accent:'#22d3ee',roomTheme:'sanctum',
   quote:'14 million futures...',grade:'A',score:92},
  {id:'hulk',name:'HULK',hero:'Bruce Banner',role:'Backtesting',emoji:'💪',
   color:'#22c55e',accent:'#4ade80',roomTheme:'reinforced_lab',
   quote:'HULK SMASH data!',grade:'B',score:80},
  {id:'warmachine',name:'WAR MACHINE',hero:'James Rhodes',role:'Trade Journal',emoji:'🔫',
   color:'#6b7280',accent:'#9ca3af',roomTheme:'arsenal',
   quote:'Boom! Logged it.',grade:'A',score:88},
  {id:'hawkeye',name:'HAWKEYE',hero:'Clint Barton',role:'Webhook Receiver',emoji:'🏹',
   color:'#a855f7',accent:'#c084fc',roomTheme:'sniper_nest',
   quote:'I never miss.',grade:'B',score:84},
  {id:'fury',name:'NICK FURY',hero:'Nick Fury',role:'Orchestrator',emoji:'🏴',
   color:'#f59e0b',accent:'#fbbf24',roomTheme:'bridge',
   quote:'Avengers, assemble!',grade:'S',score:97},
];

// ============================================================
// LIVE PRICE DATA (Binance WebSocket + simulated forex)
// ============================================================
const PAIRS = {
  BTCUSD:{price:107200,prev:106800,ws:'btcusdt'},
  ETHUSD:{price:2540,prev:2520,ws:'ethusdt'},
  SOLUSD:{price:178,prev:175,ws:'solusdt'},
  EURUSD:{price:1.1285,prev:1.1270,ws:null},
  XAUUSD:{price:3245,prev:3230,ws:null},
  USDCAD:{price:1.3685,prev:1.3700,ws:null},
};
let activePair = 'BTCUSD';
const priceHistory = {};
Object.keys(PAIRS).forEach(k => { priceHistory[k] = []; for(let i=0;i<120;i++) priceHistory[k].push(PAIRS[k].price*(1+(Math.random()-.5)*.002)); });

// WebSocket connections
function connectBinance(){
  const streams = Object.values(PAIRS).filter(p=>p.ws).map(p=>p.ws+'@trade').join('/');
  if(!streams) return;
  try {
    const ws = new WebSocket(`wss://stream.binance.com:9443/stream?streams=${streams}`);
    ws.onmessage = e => {
      const d = JSON.parse(e.data);
      if(d.data && d.data.p){
        const stream = d.data.s;
        const price = parseFloat(d.data.p);
        Object.entries(PAIRS).forEach(([k,v])=>{
          if(v.ws && stream.toLowerCase().includes(v.ws.replace('usdt',''))){
            v.prev = v.price; v.price = price;
            priceHistory[k].push(price);
            if(priceHistory[k].length>300) priceHistory[k].shift();
          }
        });
      }
    };
    ws.onerror = () => setTimeout(connectBinance, 5000);
    ws.onclose = () => setTimeout(connectBinance, 5000);
  } catch(e){ setTimeout(connectBinance, 5000); }
}
connectBinance();

// Simulate forex ticks
setInterval(()=>{
  Object.entries(PAIRS).forEach(([k,v])=>{
    if(!v.ws){
      v.prev = v.price;
      v.price *= 1 + (Math.random()-.5)*.0003;
      v.price = Math.round(v.price * 100000) / 100000;
      priceHistory[k].push(v.price);
      if(priceHistory[k].length>300) priceHistory[k].shift();
    }
  });
}, 2000);

// ============================================================
// SIGNALS / MOCK DATA
// ============================================================
const SIGNALS = [
  {pair:'BTCUSD',direction:'LONG',entry:107100,tp:108500,sl:106200,confluence:82,strategy:'SMC Entry',timeframe:'4H',invalidation:'Below 106000 on Daily'},
  {pair:'EURUSD',direction:'LONG',entry:1.1280,tp:1.1350,sl:1.1230,confluence:68,strategy:'Pullback',timeframe:'1H',invalidation:'Below 1.1220 on 4H'},
  {pair:'XAUUSD',direction:'SHORT',entry:3250,tp:3200,sl:3280,confluence:55,strategy:'Mean Reversion',timeframe:'4H',invalidation:'Above 3290 on Daily'},
];

const NEWS_ITEMS = [
  {time:'14:30 UTC',title:'Fed Chair signals cautious approach to rate cuts',score:0.3,tag:'USD'},
  {time:'12:15 UTC',title:'Bitcoin ETF inflows hit $2.1B weekly record',score:0.8,tag:'BTC'},
  {time:'10:00 UTC',title:'ECB holds rates steady, hints at June action',score:-0.2,tag:'EUR'},
  {time:'08:45 UTC',title:'UK CPI surprises to the upside at 3.2%',score:-0.4,tag:'GBP'},
  {time:'06:30 UTC',title:'China PMI beats expectations at 51.2',score:0.5,tag:'CNH'},
];

// ============================================================
// SESSION DETECTION
// ============================================================
function getActiveSessions(){
  const h = new Date().getUTCHours();
  const sessions = [];

// Pre-computed sin/cos tables
const SIN = new Float32Array(360);
const COS = new Float32Array(360);
for(let i=0;i<360;i++){SIN[i]=Math.sin(i*Math.PI/180);COS[i]=Math.cos(i*Math.PI/180);}
function fsin(a){return SIN[((a%360)+360)%360|0];}
function fcos(a){return COS[((a%360)+360)%360|0];}

// AGENT MOVEMENT SYSTEM
// ============================================================
const ACTION_EMOJIS = {
  tech_lab: ['💻','📊','🔬','⚙️'],
  command_room: ['📋','🗺️','⭐','📡'],
  mystic_chamber: ['✨','🔮','💫','🌙'],
  asgard_hall: ['⚡','🔨','🌩️','⚔️'],
  data_core: ['📈','🧮','💾','🔢'],
  web_den: ['🕸️','📰','🔍','🚨'],
  intel_room: ['🎯','📊','🗂️','🔗'],
  sanctum: ['🛡️','⏳','🌀','📐'],
  reinforced_lab: ['🧪','📉','🔄','💪'],
  arsenal: ['📝','📓','🔫','💣'],
  sniper_nest: ['🏹','📡','🎯','👁️'],
  bridge: ['🏴','📢','⚙️','🌐'],
};

function toggleAssemble(){
  assembleMode = !assembleMode;
  const btn = document.getElementById('assembleBtn');
  if(assembleMode){
    btn.classList.add('active');
    btn.textContent = '🔥 ASSEMBLED';
    assembleTimer = ASSEMBLE_DURATION;
    // Set all agents to assembling state
    agentPositions.forEach(pos => {
      pos.state = 'assembling';
      pos.stateTimer = 0;
      pos.actionEmoji = '';
      pos.actionTimer = 0;
    });
  } else {
    btn.classList.remove('active');
    btn.textContent = '⚡ ASSEMBLE';
    // Send everyone home
    agentPositions.forEach(pos => {
      pos.state = 'walking';
      pos.stateTimer = 0;
    });
  }
}

function updateAgentMovement(time){
  const furyRoomIdx = ROOM_LAYOUT.findIndex(r => r.agent === 11); // Nick Fury = index 11
  const furyRect = getRoomRect(furyRoomIdx);
  const bridgeCX = furyRect.x + furyRect.w / 2;
  const bridgeCY = furyRect.y + furyRect.h / 2 + 8;

  // Handle assemble timer countdown
  if(assembleMode){
    assembleTimer--;
    if(assembleTimer <= 0){
      assembleMode = false;
      document.getElementById('assembleBtn').classList.remove('active');
      document.getElementById('assembleBtn').textContent = '⚡ ASSEMBLE';
      agentPositions.forEach(pos => {
        pos.state = 'walking';
        pos.stateTimer = 0;
      });
    }
  }

  agentPositions.forEach((pos, i) => {
    const roomIdx = ROOM_LAYOUT.findIndex(r => r.agent === i);
    const rect = getRoomRect(roomIdx);
    const a = AVENGERS[i];
    // Walkable bounds (padded inside room)
    const padX = rect.w * 0.18;
    const padY = rect.h * 0.22;
    const minX = rect.x + padX;
    const maxX = rect.x + rect.w - padX;
    const minY = rect.y + padY + 10; // extra top pad for labels
    const maxY = rect.y + rect.h - padY - 6; // pad for bar
    const homeCX = rect.x + rect.w / 2;
    const homeCY = rect.y + rect.h / 2 + 8;

    // Initialize home position
    if(pos.homeX === 0 && pos.homeY === 0){
      pos.homeX = homeCX;
      pos.homeY = homeCY;
      pos.x = homeCX;
      pos.y = homeCY;
      pos.targetX = homeCX;
      pos.targetY = homeCY;
    }

    // ---- ASSEMBLING MODE ----
    if(pos.state === 'assembling'){
      // All agents walk toward Fury's bridge, arranged in a semicircle
      const angle = (i / AVENGERS.length) * Math.PI + Math.PI; // semicircle
      const radius = Math.min(furyRect.w, furyRect.h) * 0.28;
      const assembleX = bridgeCX + Math.cos(angle) * radius;
      const assembleY = bridgeCY + Math.sin(angle) * radius * 0.6;
      pos.targetX = assembleX;
      pos.targetY = assembleY;
      // Move toward target
      const dx = pos.targetX - pos.x;
      const dy = pos.targetY - pos.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if(dist > 2){
        const speed = 1.2;
        pos.x += (dx / dist) * speed;
        pos.y += (dy / dist) * speed;
        pos.facing = dx > 0 ? 1 : -1;
        pos.walkPhase += 0.12;
      }
      return;
    }

    // ---- NORMAL ROOM BEHAVIOR (idle / walking / working) ----
    pos.stateTimer--;

    if(pos.state === 'idle'){
      if(pos.stateTimer <= 0){
        // Transition: pick a new wander target or start working
        if(Math.random() < 0.35){
          // Start working (stay in place, show emoji)
          pos.state = 'working';
          pos.stateTimer = 80 + Math.random() * 160;
          const emojis = ACTION_EMOJIS[a.roomTheme] || ['💭'];
          pos.actionEmoji = emojis[Math.floor(Math.random() * emojis.length)];
          pos.actionTimer = pos.stateTimer;
        } else {
          // Walk to a new spot in the room
          pos.state = 'walking';
          pos.targetX = minX + Math.random() * (maxX - minX);
          pos.targetY = minY + Math.random() * (maxY - minY);
          pos.stateTimer = 300; // max walk time before giving up
        }
      }
    } else if(pos.state === 'walking'){
      const dx = pos.targetX - pos.x;
      const dy = pos.targetY - pos.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if(dist < 2 || pos.stateTimer <= 0){
        // Arrived or timed out — go idle
        pos.state = 'idle';
        pos.stateTimer = 40 + Math.random() * 120;
      } else {
        const speed = pos.walkSpeed;
        pos.x += (dx / dist) * speed;
        pos.y += (dy / dist) * speed;
        pos.facing = dx > 0 ? 1 : -1;
        pos.walkPhase += 0.1;
      }
    } else if(pos.state === 'working'){
      pos.actionTimer--;
      if(pos.stateTimer <= 0){
        // Done working, go idle
        pos.state = 'idle';
        pos.stateTimer = 30 + Math.random() * 80;
        pos.actionEmoji = '';
        pos.actionTimer = 0;
      }
    }

    // Clamp to room bounds
    pos.x = Math.max(minX, Math.min(maxX, pos.x));
    pos.y = Math.max(minY, Math.min(maxY, pos.y));
  });
}

function resizeColony(){
  const rect = colCanvas.parentElement.getBoundingClientRect();
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  colW = rect.width; colH = rect.height;
  colCanvas.width = colW * dpr; colCanvas.height = colH * dpr;
  colCanvas.style.width = colW+'px'; colCanvas.style.height = colH+'px';
  colCtx.setTransform(dpr,0,0,dpr,0,0);
  offscreen.width = colW * dpr; offscreen.height = colH * dpr;
  offCtx.setTransform(dpr,0,0,dpr,0,0);
}
resizeColony();
window.addEventListener('resize', resizeColony);

function getRoomRect(idx){
  const pad = 8;
  const corridorW = 6;
  const corridorH = 6;
  const cols = 4, rows = 3;
  const rw = (colW - pad*2 - corridorW*(cols-1)) / cols;
  const rh = (colH - pad*2 - corridorH*(rows-1)) / rows;
  const r = ROOM_LAYOUT[idx];
  return {
    x: pad + r.gx * (rw + corridorW),
    y: pad + r.gy * (rh + corridorH),
    w: rw, h: rh,
  };
}

function drawRoom(ctx, idx, t){
  const a = AVENGERS[ROOM_LAYOUT[idx].agent];
  const rect = getRoomRect(idx);
  const {x,y,w,h} = rect;
  const isHovered = hoveredRoom === idx;
  const isSelected = selectedRoom === idx;

  // Room background
  ctx.save();
  ctx.beginPath();
  const r = 6;
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
  ctx.clip();

  // Theme-specific background
  const grad = ctx.createLinearGradient(x,y,x+w,y+h);
  const baseAlpha = isHovered ? 0.15 : (isSelected ? 0.12 : 0.06);
  grad.addColorStop(0, `rgba(6,6,12,0.95)`);
  grad.addColorStop(1, hexToRGBA(a.color, baseAlpha));
  ctx.fillStyle = grad;
  ctx.fillRect(x,y,w,h);

  // Room-specific decorations
  drawRoomTheme(ctx, a, x, y, w, h, t);

  // Agent character (animated with movement)
  const ai = ROOM_LAYOUT[idx].agent;
  const pos = agentPositions[ai];

  // Skip in-room rendering if agent is assembling (drawn separately on top layer)
  if(pos.state === 'assembling'){
    // Still draw name/role/grade/bar even when agent is away
    ctx.font = "bold 8px 'Orbitron', monospace";
    ctx.fillStyle = hexToRGBA(a.color, 0.4);
    ctx.textAlign = 'center';
    ctx.fillText(a.name, x + w/2, y + 12);
    ctx.font = "7px 'JetBrains Mono', monospace";
    ctx.fillStyle = '#2a2a4a';
    ctx.fillText('[ on bridge ]', x + w/2, y + h/2);
    const barY = y + h - 8, barW = w - 16;
    ctx.fillStyle = 'rgba(255,255,255,0.03)';
    ctx.fillRect(x+8, barY, barW, 3);
    ctx.fillStyle = hexToRGBA(gradeColor(a.grade), 0.3);
    ctx.fillRect(x+8, barY, barW * (a.score / 100), 3);
    ctx.restore();
    ctx.strokeStyle = 'rgba(74,108,247,0.1)';
    ctx.lineWidth = 1;
    const rr = 6;
    ctx.beginPath();
    ctx.moveTo(x+rr,y);ctx.lineTo(x+w-rr,y);ctx.quadraticCurveTo(x+w,y,x+w,y+rr);
    ctx.lineTo(x+w,y+h-rr);ctx.quadraticCurveTo(x+w,y+h,x+w-rr,y+h);
    ctx.lineTo(x+rr,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-rr);
    ctx.lineTo(x,y+rr);ctx.quadraticCurveTo(x,y,x+rr,y);
    ctx.closePath();
    ctx.stroke();
    return;
  }

  const isWalking = pos.state === 'walking';
  const isWorking = pos.state === 'working';

  // Bob is gentler when walking, more pronounced when idle/working
  const bobAmp = isWalking ? 1.5 : 3;
  const bobSpeed = isWalking ? 4 : 2;
  const bob = Math.sin(pos.bobPhase + t * bobSpeed) * bobAmp;
  pos.bobPhase += 0.02;

  // Walk animation: side-to-side sway when moving
  const walkSway = isWalking ? Math.sin(pos.walkPhase) * 1.5 : 0;

  // Render position (use pos.x/pos.y which are updated by updateAgentMovement)
  const renderX = pos.x + walkSway;
  const renderY = pos.y + bob;

  // Shadow under character
  ctx.globalAlpha = 0.15;
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(renderX, pos.y + 10, 8, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;

  // Character glow
  const glowR = 18 + Math.sin(t*3 + ai)*4;
  const charGlow = ctx.createRadialGradient(renderX, renderY, 0, renderX, renderY, glowR);
  charGlow.addColorStop(0, hexToRGBA(a.color, isWorking ? 0.3 : 0.2));
  charGlow.addColorStop(1, 'transparent');
  ctx.fillStyle = charGlow;
  ctx.fillRect(renderX-glowR, renderY-glowR, glowR*2, glowR*2);

  // Emoji character (flipped based on facing)
  const emojiSize = Math.min(w,h)*0.22;
  ctx.save();
  ctx.translate(renderX, renderY);
  if(pos.facing === -1) ctx.scale(-1, 1);
  ctx.font = `${emojiSize}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(a.emoji, 0, 0);
  ctx.restore();

  // Walk "dust" particles when moving
  if(isWalking && Math.random() < 0.08){
    spawnParticle(renderX + (Math.random()-0.5)*6, pos.y + 8, '#4a4a6a', 20);
  }

  // Action emoji above head when working
  if(isWorking && pos.actionEmoji){
    const floatY = -emojiSize * 0.6 - 4 + Math.sin(t * 3) * 2;
    ctx.globalAlpha = Math.min(1, pos.actionTimer / 20); // fade in/out
    ctx.font = `${emojiSize * 0.55}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(pos.actionEmoji, renderX, renderY + floatY);
    ctx.globalAlpha = 1;
  }

  // Speech bubble for working state (small thought bubble dots)
  if(isWorking && pos.actionTimer > 10){
    ctx.globalAlpha = 0.4;
    ctx.fillStyle = a.color;
    const bubY = renderY - emojiSize * 0.5;
    ctx.beginPath(); ctx.arc(renderX + 6, bubY - 2, 1.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(renderX + 9, bubY - 6, 2, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Spawn themed particles occasionally
  if(Math.random() < 0.03){
    spawnParticle(renderX + (Math.random()-0.5)*30, renderY + (Math.random()-0.5)*20, a.color);
  }

  // Name label
  ctx.font = "bold 8px 'Orbitron', monospace";
  ctx.fillStyle = a.color;
  ctx.textAlign = 'center';
  ctx.fillText(a.name, x + w/2, y + 12);

  // Role label
  ctx.font = "7px 'JetBrains Mono', monospace";
  ctx.fillStyle = '#4a4a6a';
  ctx.fillText(a.role, x + w/2, y + 22);

  // Grade badge (top right)
  ctx.font = "bold 12px 'Orbitron', monospace";
  ctx.textAlign = 'right';
  ctx.fillStyle = gradeColor(a.grade);
  ctx.fillText(a.grade, x + w - 6, y + 14);

  // Health/activity bar at bottom
  const barY = y + h - 8;
  const barW = w - 16;
  ctx.fillStyle = 'rgba(255,255,255,0.03)';
  ctx.fillRect(x+8, barY, barW, 3);
  const fillW = barW * (a.score / 100);
  ctx.fillStyle = gradeColor(a.grade);
  ctx.fillRect(x+8, barY, fillW, 3);

  // Mini data readout
  ctx.font = "7px 'JetBrains Mono', monospace";
  ctx.textAlign = 'left';
  ctx.fillStyle = '#7a7a9a';
  ctx.fillText(`Score: ${a.score}`, x + 6, y + h - 16);

  ctx.restore();

  // Border
  ctx.strokeStyle = isSelected ? a.color : (isHovered ? hexToRGBA(a.color, 0.5) : 'rgba(74,108,247,0.1)');
  ctx.lineWidth = isSelected ? 2 : 1;
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
  ctx.stroke();
}

function drawRoomTheme(ctx, agent, x, y, w, h, t){
  const cx = x + w/2, cy = y + h/2;
  ctx.globalAlpha = 0.15;

  switch(agent.roomTheme){
    case 'tech_lab':
      // Holographic grid + floating HUD elements
      ctx.strokeStyle = agent.color;
      ctx.lineWidth = 0.5;
      for(let i=0;i<w;i+=12){ ctx.beginPath();ctx.moveTo(x+i,y);ctx.lineTo(x+i,y+h);ctx.stroke(); }
      for(let i=0;i<h;i+=12){ ctx.beginPath();ctx.moveTo(x,y+i);ctx.lineTo(x+w,y+i);ctx.stroke(); }
      // Arc reactor glow
      ctx.globalAlpha = 0.2;
      const arcR = 15 + Math.sin(t*4)*3;
      ctx.beginPath(); ctx.arc(cx, cy-15, arcR, 0, Math.PI*2);
      ctx.fillStyle = '#06b6d4'; ctx.fill();
      break;

    case 'command_room':
      // Military-style map grid with star
      ctx.strokeStyle = '#3b82f6';
      ctx.lineWidth = 0.3;
      for(let i=0;i<3;i++){
        ctx.beginPath();ctx.arc(cx,cy,20+i*15,0,Math.PI*2);ctx.stroke();
      }
      ctx.globalAlpha = 0.3;
      ctx.font = '24px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillStyle = '#3b82f6'; ctx.fillText('★', x+w-18, y+h-18);
      break;

    case 'mystic_chamber':
      // Swirling energy
      ctx.strokeStyle = '#ec4899';
      ctx.lineWidth = 1;
      for(let i=0;i<3;i++){
        const angle = t*50 + i*120;
        const rx = 25 + i*8, ry = 15 + i*5;
        ctx.beginPath();
        ctx.ellipse(cx, cy, rx, ry, angle*Math.PI/180, 0, Math.PI*2);
        ctx.stroke();
      }
      break;

    case 'asgard_hall':
      // Lightning bolts
      ctx.strokeStyle = '#eab308'; ctx.lineWidth = 1.5;
      const lx = cx + Math.sin(t*5)*15;
      ctx.beginPath();ctx.moveTo(lx,y+10);ctx.lineTo(lx-8,cy);ctx.lineTo(lx+5,cy);ctx.lineTo(lx-3,y+h-10);ctx.stroke();
      // Bifrost shimmer
      const bGrad = ctx.createLinearGradient(x,y+h-6,x+w,y+h-6);
      bGrad.addColorStop(0,'#ef4444');bGrad.addColorStop(0.5,'#eab308');bGrad.addColorStop(1,'#3b82f6');
      ctx.fillStyle = bGrad;ctx.fillRect(x,y+h-4,w,4);
      break;

    case 'data_core':
      // Matrix-style data rain
      ctx.font = "7px 'JetBrains Mono', monospace";
      ctx.fillStyle = '#10b981';
      for(let i=0;i<6;i++){
        const dx = x + 10 + i*(w/6);
        const dy = (y + (t*30 + i*40) % h);
        ctx.fillText(Math.random()>0.5?'1':'0', dx, dy);
      }
      break;

    case 'web_den':
      // Spider web pattern
      ctx.strokeStyle = '#9ca3af'; ctx.lineWidth = 0.3;
      for(let i=0;i<8;i++){
        const angle = i * 45 * Math.PI/180;
        ctx.beginPath();ctx.moveTo(cx,cy);
        ctx.lineTo(cx+Math.cos(angle)*w/2, cy+Math.sin(angle)*h/2);ctx.stroke();
      }
      for(let r=10;r<w/2;r+=12){
        ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke();
      }
      break;

    case 'intel_room':
      // Multiple monitor outlines
      ctx.strokeStyle = '#8b5cf6'; ctx.lineWidth = 0.5;
      for(let i=0;i<3;i++){
        const mx = x+8+i*(w/3-2), my=y+30, mw=w/3-8, mh=h/3;
        ctx.strokeRect(mx,my,mw,mh);
        // Scanline
        const sl = (t*20+i*10)%mh;
        ctx.globalAlpha = 0.1;
        ctx.fillStyle = '#8b5cf6';ctx.fillRect(mx,my+sl,mw,1);
        ctx.globalAlpha = 0.15;
      }
      break;

    case 'sanctum':
      // Portal rings
      ctx.strokeStyle = '#f59e0b'; ctx.lineWidth = 1.5;
      const portalA = t * 60;
      ctx.beginPath();ctx.ellipse(cx, cy, 22, 22, portalA*Math.PI/180, 0, Math.PI*2);ctx.stroke();
      ctx.strokeStyle = '#06b6d4';
      ctx.beginPath();ctx.ellipse(cx, cy, 18, 18, -portalA*Math.PI/180, 0, Math.PI*2);ctx.stroke();
      // Sparkles
      for(let i=0;i<4;i++){
        const sa = portalA+i*90;
        const sx = cx + Math.cos(sa*Math.PI/180)*20;
        const sy = cy + Math.sin(sa*Math.PI/180)*20;
        ctx.fillStyle='#f59e0b';ctx.fillRect(sx-1,sy-1,2,2);
      }
      break;

    case 'reinforced_lab':
      // Cracked walls + green glow
      ctx.strokeStyle = '#4a4a6a'; ctx.lineWidth = 1;
      ctx.beginPath();ctx.moveTo(x+10,y);ctx.lineTo(x+20,y+15);ctx.lineTo(x+15,y+30);ctx.stroke();
      ctx.beginPath();ctx.moveTo(x+w-10,y+h);ctx.lineTo(x+w-20,y+h-20);ctx.stroke();
      // Green radioactive glow
      ctx.globalAlpha = 0.1;
      const hulkGrad = ctx.createRadialGradient(cx,cy,0,cx,cy,w/2);
      hulkGrad.addColorStop(0,'#22c55e');hulkGrad.addColorStop(1,'transparent');
      ctx.fillStyle = hulkGrad;ctx.fillRect(x,y,w,h);
      break;

    case 'arsenal':
      // Ammo rack lines + journal icon
      ctx.strokeStyle = '#6b7280'; ctx.lineWidth = 0.5;
      for(let i=0;i<5;i++){
        ctx.beginPath();ctx.moveTo(x+6,y+30+i*12);ctx.lineTo(x+w-6,y+30+i*12);ctx.stroke();
        for(let j=0;j<8;j++){
          ctx.fillStyle='#6b7280';ctx.fillRect(x+8+j*((w-16)/8),y+27+i*12,3,6);
        }
      }
      break;

    case 'sniper_nest':
      // Crosshair + scope view
      ctx.strokeStyle = '#a855f7'; ctx.lineWidth = 0.5;
      ctx.beginPath();ctx.moveTo(cx-20,cy);ctx.lineTo(cx+20,cy);ctx.stroke();
      ctx.beginPath();ctx.moveTo(cx,cy-20);ctx.lineTo(cx,cy+20);ctx.stroke();
      ctx.beginPath();ctx.arc(cx,cy,15,0,Math.PI*2);ctx.stroke();
      ctx.beginPath();ctx.arc(cx,cy,8,0,Math.PI*2);ctx.stroke();
      break;

    case 'bridge':
      // Command bridge with multiple screens
      ctx.strokeStyle = '#f59e0b'; ctx.lineWidth = 0.8;
      // Central screen
      ctx.strokeRect(cx-20,y+25,40,25);
      // Side screens
      ctx.strokeRect(x+6,y+30,25,18);ctx.strokeRect(x+w-31,y+30,25,18);
      // Console
      ctx.fillStyle = '#f59e0b';ctx.globalAlpha=0.1;
      ctx.fillRect(x+10,y+h-22,w-20,12);
      ctx.globalAlpha=0.15;
      // Eye of Fury
      ctx.beginPath();ctx.arc(cx,cy+10,5,0,Math.PI*2);
      ctx.fillStyle='#f59e0b';ctx.globalAlpha=0.3;ctx.fill();
      break;
  }
  ctx.globalAlpha = 1;
}

// Draw agents that are assembled in Fury's bridge (unclipped, on top of everything)
function drawAssemblingAgents(ctx, t){
  agentPositions.forEach((pos, i) => {
    if(pos.state !== 'assembling') return;
    const a = AVENGERS[i];
    const isWalking = true;
    const walkSway = Math.sin(pos.walkPhase) * 1.5;
    const bob = Math.sin(pos.bobPhase + t * 4) * 1.5;
    const renderX = pos.x + walkSway;
    const renderY = pos.y + bob;

    // Trail effect while moving
    const dx = pos.targetX - pos.x;
    const dy = pos.targetY - pos.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if(dist > 5){
      // Motion trail
      ctx.globalAlpha = 0.1;
      ctx.fillStyle = a.color;
      for(let tr=1; tr<=3; tr++){
        ctx.beginPath();
        ctx.arc(renderX - dx/dist*tr*4, renderY - dy/dist*tr*4, 6-tr, 0, Math.PI*2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    // Shadow
    ctx.globalAlpha = 0.2;
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.ellipse(renderX, pos.y + 10, 8, 3, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;

    // Glow (brighter when assembled)
    const glowR = 22;
    const glow = ctx.createRadialGradient(renderX, renderY, 0, renderX, renderY, glowR);
    glow.addColorStop(0, hexToRGBA(a.color, 0.35));
    glow.addColorStop(1, 'transparent');
    ctx.fillStyle = glow;
    ctx.fillRect(renderX-glowR, renderY-glowR, glowR*2, glowR*2);

    // Character
    const emojiSize = 18;
    ctx.save();
    ctx.translate(renderX, renderY);
    if(pos.facing === -1) ctx.scale(-1, 1);
    ctx.font = `${emojiSize}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(a.emoji, 0, 0);
    ctx.restore();

    // Name tag below when close to target
    if(dist < 10){
      ctx.font = "bold 6px 'Orbitron', monospace";
      ctx.fillStyle = a.color;
      ctx.textAlign = 'center';
      ctx.globalAlpha = 0.8;
      ctx.fillText(a.name, renderX, renderY + 14);
      ctx.globalAlpha = 1;
    }
  });

  // "ASSEMBLED" banner when everyone is in position
  const allInPlace = agentPositions.every(p => {
    if(p.state !== 'assembling') return true;
    const dx = p.targetX - p.x;
    const dy = p.targetY - p.y;
    return Math.sqrt(dx*dx + dy*dy) < 5;
  });
  if(allInPlace && assembleMode){
    const furyIdx = ROOM_LAYOUT.findIndex(r => r.agent === 11);
    const fr = getRoomRect(furyIdx);
    ctx.font = "bold 10px 'Orbitron', monospace";
    ctx.textAlign = 'center';
    ctx.fillStyle = '#f59e0b';
    ctx.globalAlpha = 0.6 + Math.sin(t * 4) * 0.4;
    ctx.fillText('⚡ AVENGERS ASSEMBLED ⚡', fr.x + fr.w/2, fr.y + 14);
    ctx.globalAlpha = 1;
  }
}

// Corridor connections between rooms
function drawCorridors(ctx){
  ctx.strokeStyle = 'rgba(74,108,247,0.06)';
  ctx.lineWidth = 2;
  // Draw data flow lines between rooms
  for(let i=0;i<ROOM_LAYOUT.length-1;i++){
    const r1 = getRoomRect(i);
    const r2 = getRoomRect(i+1);
    const x1 = r1.x + r1.w/2, y1 = r1.y + r1.h/2;
    const x2 = r2.x + r2.w/2, y2 = r2.y + r2.h/2;
    // Only draw to adjacent rooms
    const dist = Math.sqrt((x2-x1)**2+(y2-y1)**2);
    if(dist < r1.w * 1.8){
      ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
    }
  }
}

function drawParticles(ctx, t){
  for(let i=particles.length-1; i>=0; i--){
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.life--;
    if(p.life <= 0){ particles.splice(i,1); continue; }
    const alpha = (p.life / p.maxLife) * 0.6;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha = 1;
}

let frameCount = 0, lastFpsTime = performance.now(), fps = 0;
function renderColony(t){
  const time = t / 1000;

  // Update agent movement each frame
  updateAgentMovement(time);

  offCtx.clearRect(0, 0, colW, colH);

  // Background
  offCtx.fillStyle = '#06060c';
  offCtx.fillRect(0, 0, colW, colH);

  // Corridors
  drawCorridors(offCtx);

  // Rooms
  for(let i=0;i<ROOM_LAYOUT.length;i++){
    drawRoom(offCtx, i, time);
  }

  // Draw assembling agents ON TOP of rooms (not clipped)
  if(assembleMode || agentPositions.some(p => p.state === 'assembling')){
    drawAssemblingAgents(offCtx, time);
  }

  // Particles
  drawParticles(offCtx, time);

  // Copy to main canvas
  colCtx.clearRect(0, 0, colW, colH);
  colCtx.drawImage(offscreen, 0, 0, colW, colH);

  // FPS
  frameCount++;
  const now = performance.now();
  if(now - lastFpsTime >= 1000){
    fps = frameCount;
    frameCount = 0;
    lastFpsTime = now;
    document.getElementById('fpsCounter').textContent = fps + ' FPS';
  }

  requestAnimationFrame(renderColony);
}
requestAnimationFrame(renderColony);

const chartCanvas = document.getElementById('chartCanvas');
const chartCtx = chartCanvas.getContext('2d');

function renderChart(){
  const wrap = chartCanvas.parentElement;
  const cw = wrap.clientWidth, ch = wrap.clientHeight;
  const dpr = Math.min(window.devicePixelRatio||1, 2);
  chartCanvas.width = cw*dpr; chartCanvas.height = ch*dpr;
  chartCanvas.style.width = cw+'px'; chartCanvas.style.height = ch+'px';
  chartCtx.setTransform(dpr,0,0,dpr,0,0);

  const data = priceHistory[activePair] || [];
  if(data.length < 2) return;

  const pair = PAIRS[activePair];
  const price = pair.price;
  const chg = ((price - pair.prev) / pair.prev * 100);

  // Update price display
  const dp = price < 10 ? 4 : price < 1000 ? 2 : 0;
  document.getElementById('pdPrice').textContent = price.toFixed(dp);
  const pdChg = document.getElementById('pdChg');
  pdChg.textContent = (chg>=0?'+':'') + chg.toFixed(3) + '%';
  pdChg.style.color = chg>=0 ? '#10b981' : '#ef4444';

  // Draw chart
  const pad = {t:8,r:8,b:20,l:50};
  const gw = cw-pad.l-pad.r, gh = ch-pad.t-pad.b;
  const slice = data.slice(-Math.min(data.length, 120));
  const min = Math.min(...slice), max = Math.max(...slice);
  const range = max-min || 1;

  // Background
  chartCtx.fillStyle = '#0a0a14';
  chartCtx.fillRect(0,0,cw,ch);

  // Grid
  chartCtx.strokeStyle = 'rgba(74,108,247,0.06)';
  chartCtx.lineWidth = 0.5;
  for(let i=0;i<5;i++){
    const gy = pad.t + (gh/4)*i;
    chartCtx.beginPath();chartCtx.moveTo(pad.l,gy);chartCtx.lineTo(cw-pad.r,gy);chartCtx.stroke();
    const val = max - (range/4)*i;
    chartCtx.font = "8px 'JetBrains Mono', monospace";
    chartCtx.fillStyle = '#4a4a6a';
    chartCtx.textAlign = 'right';
    chartCtx.fillText(val.toFixed(dp), pad.l-4, gy+3);
  }

  // Price line
  const isUp = slice[slice.length-1] >= slice[0];
  const lineColor = isUp ? '#10b981' : '#ef4444';
  chartCtx.strokeStyle = lineColor;
  chartCtx.lineWidth = 1.5;
  chartCtx.beginPath();
  slice.forEach((p, i) => {
    const px = pad.l + (i/(slice.length-1))*gw;
    const py = pad.t + (1-(p-min)/range)*gh;
    i===0 ? chartCtx.moveTo(px,py) : chartCtx.lineTo(px,py);
  });
  chartCtx.stroke();

  // Gradient fill
  const lastPx = pad.l + gw;
  const lastPy = pad.t + (1-(slice[slice.length-1]-min)/range)*gh;
  chartCtx.lineTo(lastPx, pad.t+gh);
  chartCtx.lineTo(pad.l, pad.t+gh);
  chartCtx.closePath();
  const grad = chartCtx.createLinearGradient(0,pad.t,0,pad.t+gh);
  grad.addColorStop(0, hexToRGBA(lineColor, 0.15));
  grad.addColorStop(1, 'transparent');
  chartCtx.fillStyle = grad;
  chartCtx.fill();

  // Current price line
  chartCtx.setLineDash([3,3]);
  chartCtx.strokeStyle = hexToRGBA(lineColor, 0.5);
  chartCtx.lineWidth = 0.5;
  chartCtx.beginPath();chartCtx.moveTo(pad.l,lastPy);chartCtx.lineTo(cw-pad.r,lastPy);chartCtx.stroke();
  chartCtx.setLineDash([]);

  // Current price label
  chartCtx.fillStyle = lineColor;
  chartCtx.font = "bold 9px 'JetBrains Mono', monospace";
  chartCtx.textAlign = 'left';
  chartCtx.fillText(price.toFixed(dp), cw-pad.r+2, lastPy+3);
}

function updateTopPrices(){
  const container = document.getElementById('topPrices');
  const show = ['BTCUSD','ETHUSD','EURUSD','XAUUSD'];
  container.innerHTML = show.map(k => {
    const p = PAIRS[k];
    const chg = ((p.price - p.prev)/p.prev*100);
    const dp = p.price < 10 ? 4 : p.price < 1000 ? 2 : 0;
    return `<span class="tb-price"><span class="sym">${k}</span> <span class="val">${p.price.toFixed(dp)}</span> <span class="chg ${chg>=0?'up':'dn'}">${chg>=0?'+':''}${chg.toFixed(2)}%</span></span>`;
  }).join('');
}

// UTILITY

function hexToRGBA(hex, alpha){
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}
function gradeColor(g){
  return {S:'#10b981',A:'#06b6d4',B:'#eab308',C:'#f59e0b',D:'#ef4444',F:'#ef4444'}[g]||'#4a4a6a';
}
