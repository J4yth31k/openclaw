<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenClaw SimWorld</title>
<style>
  body {
    margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center;
    background: #06060c; color: #d8d8e8; font-family: system-ui, sans-serif; text-align: center;
  }
  .card { max-width: 460px; padding: 32px; }
  h1 { font-size: 22px; background: linear-gradient(90deg, #00d4ff, #7c3aed);
       -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  p  { font-size: 14px; line-height: 1.6; color: #7a7a9a; }
  code { background: #14141f; padding: 2px 6px; border-radius: 4px; color: #00d4ff; }
</style>
</head>
<body>
  <div class="card">
    <h1>🌍 OpenClaw SimWorld</h1>
    <p>
      If you're seeing this page, the deployment served the repository root
      instead of the built app. The app lives in <code>simworld/</code> and is built by
      the <code>vercel.json</code> config (<code>npm ci &amp;&amp; npm run build</code> →
      <code>simworld/dist</code>). Check the platform's build settings and redeploy.
    </p>
  </div>
</body>
</html>
